// ── Renders raw PDF cards for the Ancient Library tab ───────────────────────
// Accepts pdf_groups: [{folder, folder_name, pdfs:[{name,filename,url,size_kb}]}]
function renderLibraryPDFsHTML(pdfGroups) {
  const groups = pdfGroups || [];
  const totalPdfs = groups.reduce((n, g) => n + g.pdfs.length, 0);

  if (totalPdfs === 0) {
    return `
      <div class="pdf-empty-msg">
        <h3>📂 No PDFs Found</h3>
        <p>Drop <code>.pdf</code> files into any subject folder to view them here.</p>
        <p style="margin-top:8px;font-size:12px;color:#3a2a50">
          e.g. <code>subjects/dsa2/exam_2023.pdf</code> or <code>subjects/svv/notes.pdf</code>
        </p>
      </div>`;
  }

  // Flat index for unique IDs across all groups
  let globalIdx = 0;

  // ── Tab buttons row ──────────────────────────────────────────────────────
  const tabBtns = groups.map((group, gi) =>
    `<button
       class="lib-subject-tab${gi === 0 ? ' active' : ''}"
       onclick="switchLibSubjectTab(${gi}, ${groups.length})"
       id="lib-stab-${gi}">
       📂 ${escHtml(group.folder_name)}
       <span style="font-size:10px;opacity:0.65;margin-left:4px">(${group.pdfs.length})</span>
     </button>`
  ).join('');

  // ── Tab content panels ───────────────────────────────────────────────────
  const tabPanels = groups.map((group, gi) => {
    const pdfCards = group.pdfs.map(pdf => {
      const idx = globalIdx++;
      // Build absolute URL so play.html opened as file:// can reach the server
      // pdf.url is like "/subjects/dsa2/file.pdf" — prepend API base + encode each filename segment
      const encodedUrl = API + '/' + pdf.url.split('/').filter(s => s !== '').map(seg => encodeURIComponent(seg)).join('/');
      const safeUrl  = escHtml(encodedUrl);
      const safeName = escHtml(pdf.name);
      return `
        <div class="pdf-card" id="pdfcard-${idx}">
          <div class="pdf-card-header">
            <span class="pdf-card-icon">📄</span>
            <div class="pdf-card-info">
              <div class="pdf-card-name">${safeName}</div>
              <div class="pdf-card-meta">${pdf.size_kb ? pdf.size_kb + ' KB' : ''}</div>
            </div>
            <div style="display:flex;gap:6px;flex-shrink:0">
              <button class="pdf-card-btn" id="pdfbtn-${idx}" onclick="togglePDFViewer(${idx}, '${safeUrl}', '${safeName}')">
                📖 View
              </button>
              <a class="pdf-card-btn" href="${safeUrl}" target="_blank" style="text-decoration:none;display:inline-flex;align-items:center">
                ↗ Tab
              </a>
            </div>
          </div>
          <div id="pdfview-${idx}" class="pdf-viewer-wrap" style="display:none">
            <div class="pdf-viewer-toolbar">
              <span class="pdf-viewer-title" id="pdftitle-${idx}">📄 ${safeName}</span>
              <div style="display:flex;gap:6px;align-items:center">
                <span id="pdfpages-${idx}" style="color:#5a4a7a;font-size:11px"></span>
                <a class="pdf-viewer-close" href="${safeUrl}" target="_blank" style="text-decoration:none">↗ Open in tab</a>
                <button class="pdf-viewer-close" onclick="togglePDFViewer(${idx}, '${safeUrl}', '${safeName}')">✕ Close</button>
              </div>
            </div>
            <div id="pdfcanvas-${idx}" class="pdf-canvas-wrap"></div>
          </div>
        </div>`;
    }).join('');

    return `
      <div class="lib-subject-panel" id="lib-spanel-${gi}" style="display:${gi === 0 ? 'block' : 'none'}">
        ${pdfCards}
      </div>`;
  }).join('');

  return `
    <div class="pdf-library">
      <div class="lib-subject-tabs">${tabBtns}</div>
      <div class="lib-subject-content">${tabPanels}</div>
    </div>`;
}

function switchLibSubjectTab(activeIdx, total) {
  for (let i = 0; i < total; i++) {
    const btn   = document.getElementById('lib-stab-' + i);
    const panel = document.getElementById('lib-spanel-' + i);
    if (btn)   btn.classList.toggle('active', i === activeIdx);
    if (panel) panel.style.display = i === activeIdx ? 'block' : 'none';
  }
}

// ── PDF.js viewer ─────────────────────────────────────────────────────────────
// Set the worker source once PDF.js is loaded
function _initPDFjs() {
  if (typeof pdfjsLib !== 'undefined' && !pdfjsLib.GlobalWorkerOptions.workerSrc) {
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }
}

function togglePDFViewer(idx, url, name) {
  const wrap = document.getElementById('pdfview-' + idx);
  const btn  = document.getElementById('pdfbtn-' + idx);
  if (!wrap) return;
  const opening = wrap.style.display === 'none';
  wrap.style.display = opening ? '' : 'none';
  if (btn) btn.textContent = opening ? '📖 Close' : '📖 View';
  if (opening) {
    const container = document.getElementById('pdfcanvas-' + idx);
    // Only render once
    if (container && !container.getAttribute('data-loaded')) {
      container.setAttribute('data-loaded', '1');
      renderPDFWithPDFjs(container, url, idx);
    }
  }
}

async function renderPDFWithPDFjs(container, url, idx) {
  _initPDFjs();
  if (typeof pdfjsLib === 'undefined') {
    container.innerHTML = `<div style="padding:24px;text-align:center;color:#7a6a3a">
      PDF.js not loaded. <a href="${url}" target="_blank" style="color:#aaa8ff">Open in new tab ↗</a></div>`;
    return;
  }

  container.innerHTML = `<div style="padding:24px;text-align:center;color:#5a4a7a">
    <div style="font-size:24px;margin-bottom:8px">⏳</div>Loading PDF…</div>`;

  try {
    const loadingTask = pdfjsLib.getDocument(url);
    const pdf = await loadingTask.promise;

    const pagesEl = document.getElementById('pdfpages-' + idx);
    if (pagesEl) pagesEl.textContent = `${pdf.numPages} page${pdf.numPages !== 1 ? 's' : ''}`;

    container.innerHTML = '';

    // Render pages sequentially
    for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
      const page = await pdf.getPage(pageNum);

      // Scale to fill the container width (max ~900px)
      const containerW = container.clientWidth || 800;
      const unscaled   = page.getViewport({ scale: 1 });
      const scale      = Math.min((containerW - 8) / unscaled.width, 2.2);
      const viewport   = page.getViewport({ scale });

      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'position:relative;margin-bottom:6px;border-radius:4px;overflow:hidden;background:#fff';

      const canvas = document.createElement('canvas');
      canvas.width  = Math.floor(viewport.width);
      canvas.height = Math.floor(viewport.height);
      canvas.style.cssText = 'display:block;width:100%;';
      wrapper.appendChild(canvas);

      // Page number label
      const label = document.createElement('div');
      label.textContent = `Page ${pageNum} / ${pdf.numPages}`;
      label.style.cssText = 'position:absolute;bottom:4px;right:8px;font-size:10px;color:#888;background:rgba(0,0,0,0.4);padding:1px 6px;border-radius:4px;pointer-events:none';
      wrapper.appendChild(label);

      container.appendChild(wrapper);

      await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
    }
  } catch (err) {
    console.error('PDF.js error:', err);
    container.innerHTML = `<div style="padding:24px;text-align:center;color:#cc7766">
      <div style="font-size:20px;margin-bottom:8px">⚠️</div>
      Could not render PDF.<br>
      <a href="${url}" target="_blank" style="color:#aaaaff;font-size:13px">↗ Open in new tab instead</a>
    </div>`;
  }
}

// ── Renders concept summaries for the Field Notes tab ───────────────────────
function renderConceptNotesHTML(concepts) {
  if (!concepts || concepts.length === 0) {
    return `<div style="color:#4a3a6a;text-align:center;padding:30px">No concept data found.</div>`;
  }
  return `
    <div class="library-header">
      <span class="lib-icon">🗒️</span>
      <div>
        <h2 style="color:#88aa88">Field Notes</h2>
        <p>Quick-reference summaries for every topic. Tap a card to expand it.</p>
      </div>
    </div>
    <div class="concept-list">
      ${concepts.map(c => renderConceptCard(c, false)).join('')}
    </div>
  `;
}

function renderLibraryHTML(concepts, expandId=null) {
  if (!concepts?.length) return `<div style="color:#444;text-align:center;padding:20px">No library data found.</div>`;
  return `
    <div class="library-header">
      <span class="lib-icon">📚</span>
      <div>
        <h2>Ancient Library</h2>
        <p>Study notes for the Unbound World's knowledge archive. Read before you fight.</p>
      </div>
    </div>
    <div class="concept-list">
      ${concepts.map(c => renderConceptCard(c, c.id === expandId)).join('')}
    </div>
  `;
}

function renderConceptCard(c, expanded=false) {
  const diffDots = '◆'.repeat(c.difficulty||1) + '<span style="opacity:.2">' + '◆'.repeat(5-(c.difficulty||1)) + '</span>';
  return `
    <div class="concept-card ${expanded?'active':''}" id="cc-${c.id}" onclick="toggleConceptCard('${c.id}')">
      <div class="cc-top">
        <span class="cc-icon">${c.icon||'📖'}</span>
        <span class="cc-name">${escHtml(c.name)}</span>
        <span class="cc-diff">${diffDots}</span>
      </div>
      <div class="concept-detail">
        <div class="cd-summary">${escHtml(c.explanation||'')}</div>
        ${c.notes ? `<div class="cd-notes">${escHtml(c.notes)}</div>` : ''}
        ${c.examples?.length ? `
          <div class="cd-examples">
            <div class="cde-label">Examples</div>
            ${c.examples.map(ex=>`<div class="cd-ex-item">▸ ${escHtml(ex)}</div>`).join('')}
          </div>` : ''}
        ${c.complexity ? `<div class="cd-complexity">⏱ ${escHtml(c.complexity)}</div>` : ''}
      </div>
    </div>
  `;
}

function toggleConceptCard(id) {
  const el = document.getElementById(`cc-${id}`);
  if (el) el.classList.toggle('active');
}

async function startPPQuiz() {
  if (ppState.active) { renderPPQuizScreen(); return; }
  ppState.active  = true;
  ppState.score   = 0;
  ppState.total   = 0;
  ppState.seenIds = [];
  ppState.locked  = false;
  ppState.filters = {
    concept: document.getElementById('pp-concept')?.value || '',
    type:    document.getElementById('pp-type')?.value    || '',
    tier:    document.getElementById('pp-tier')?.value    || '',
  };
  navBack = null; // lock back while quiz is active
  await loadNextPPQuestion();
}

async function loadNextPPQuestion() {
  const q = await api("/api/past_papers/question","POST",{
    concept_id:    ppState.filters.concept || null,
    question_type: ppState.filters.type    || null,
    tier:          ppState.filters.tier    || null,
    seen_ids:      ppState.seenIds,
  });
  if (!q) {
    renderPPEnd();
    return;
  }
  ppState.currentQ = q;
  ppState.seenIds.push(q.id);
  renderPPQuizScreen();
}

function renderPPQuizScreen() {
  const q = ppState.currentQ;
  if (!q) { renderPPEnd(); return; }

  render(`
    <div class="header"><h1>C.R.A.M — The Unbound</h1></div>
    <div class="pp-quiz-header">
      <div class="pp-quiz-score">📜 ${ppState.score} / ${ppState.total}</div>
      <div class="pp-quiz-meta">
        <div style="color:#3a7a3a">✓ ${ppState.score} correct</div>
        <div style="color:#7a3a3a">✗ ${ppState.total - ppState.score} wrong</div>
      </div>
      <button class="back-btn" style="margin:0" onclick="confirmQuitPP()">✕ Quit</button>
    </div>

    <div class="pp-qbox">
      <div class="pp-concept-tag">${renderQTypeBadge(q)} &nbsp;${escHtml(q.concept||'')}</div>
      <div class="pp-question ${q.type==='long_exam'?'bqtext-lg':''}">${escHtml(q.question)}</div>
      ${renderPPInput(q)}
      <div id="pp-result"></div>
    </div>
  `);
}

function renderPPInput(q) {
  const type = q.type || 'multiple_choice';
  if (type === 'true_false') {
    return `<div class="boptgrid tf-grid">
      <button class="bopt tf-opt" id="ppOptTrue"  onclick="submitPPAnswer('True')">✅ True</button>
      <button class="bopt tf-opt" id="ppOptFalse" onclick="submitPPAnswer('False')">❌ False</button>
    </div>`;
  }
  if (type === 'multiple_choice') {
    return `<div class="boptgrid">
      ${(q.options||[]).map((opt,i)=>`
        <button class="bopt" id="ppOpt${i}" onclick="submitPPAnswer('${escAttr(opt)}')">${escHtml(opt)}</button>
      `).join('')}
    </div>`;
  }
  // Open-ended
  return `<div class="open-q-wrap">
    <div class="open-q-frame">${type==='define'?'Define the term or concept above.':type==='short_exam'?'Give a concise answer (2–4 sentences).':'Write a detailed explanation.'}</div>
    <textarea id="ppOpenAns" class="open-q-input ${type==='long_exam'?'open-q-lg':''}" placeholder="Type your answer…"></textarea>
    <button class="abtn open-q-submit" onclick="showPPModelAnswer()">Submit Answer →</button>
  </div>`;
}

async function submitPPAnswer(answer) {
  if (ppState.locked) return;
  ppState.locked = true;
  document.querySelectorAll(".bopt").forEach(b => b.disabled = true);

  const r = await api("/api/past_papers/evaluate","POST",{
    question_id: ppState.currentQ.id,
    answer: answer,
  });
  if (!r) { ppState.locked = false; return; }

  ppState.total++;
  if (r.correct) ppState.score++;

  // Highlight buttons
  document.querySelectorAll(".bopt").forEach(btn => {
    const t = btn.textContent.trim();
    if (t === answer.trim())              btn.classList.add(r.correct ? 'correct' : 'wrong');
    if (t === r.correct_answer && !r.correct) btn.classList.add('correct');
  });

  const resultEl = document.getElementById("pp-result");
  if (resultEl) {
    resultEl.innerHTML = `
      <div class="pp-result-box ${r.correct?'correct':'wrong'}">
        ${r.correct ? '✅ Correct!' : `❌ Wrong — correct answer: <b>${escHtml(r.correct_answer)}</b>`}
        ${r.explanation ? `<div style="margin-top:6px;opacity:0.8;font-size:12px">${escHtml(r.explanation)}</div>` : ''}
      </div>
      <button class="abtn" data-t="info" onclick="ppNextQuestion()" style="margin-top:8px">Next Question →</button>
    `;
  }
}

async function showPPModelAnswer() {
  if (ppState.locked) return;
  ppState.locked = true;
  const ta = document.getElementById("ppOpenAns");
  if (ta) ta.disabled = true;

  const r = await api("/peek_answer","POST",{question_id: ppState.currentQ.id});
  const modelAns = r?.correct_answer || "(no answer available)";

  const resultEl = document.getElementById("pp-result");
  if (resultEl) {
    resultEl.innerHTML = `
      <div class="self-eval-panel" style="margin-top:10px">
        <div class="sep-title">📖 Model Answer</div>
        <div class="sep-body">${escHtml(modelAns)}</div>
        ${r?.explanation ? `<div class="sep-expl">${escHtml(r.explanation)}</div>` : ''}
        <div class="sep-question">Did your answer cover the key ideas?</div>
        <div style="display:flex;gap:8px;margin-top:8px">
          <button class="bopt correct" style="flex:1" onclick="submitPPSelfEval(true)">✅ I got it</button>
          <button class="bopt wrong"  style="flex:1" onclick="submitPPSelfEval(false)">❌ I missed it</button>
        </div>
      </div>
    `;
  }
  ppState.locked = false;
}

async function submitPPSelfEval(correct) {
  if (ppState.locked) return;
  ppState.locked = true;
  ppState.total++;
  if (correct) ppState.score++;

  const resultEl = document.getElementById("pp-result");
  const panel = resultEl?.querySelector(".self-eval-panel");
  if (panel) {
    panel.innerHTML += `<div style="margin-top:10px;color:${correct?'#8d8':'#d88'};font-size:13px">${correct?'✅ Marked correct':'❌ Marked wrong'}</div>`;
  }
  document.querySelectorAll(".bopt").forEach(b => b.disabled = true);
  if (resultEl) {
    resultEl.insertAdjacentHTML("beforeend",`
      <button class="abtn" data-t="info" onclick="ppNextQuestion()" style="margin-top:12px">Next Question →</button>
    `);
  }
}

async function ppNextQuestion() {
  ppState.locked = false;
  await loadNextPPQuestion();
}

function confirmQuitPP() {
  const ok = confirm("Quit this revision session? Your score will be lost.");
  if (ok) {
    ppState.active = false;
    renderPastPapers();
  }
}

function renderPPEnd() {
  const pct = ppState.total > 0 ? Math.round((ppState.score/ppState.total)*100) : 0;
  let grade = '💀', gradeLabel = 'Needs Work', gradeSub = 'The archive has not been kind. Study harder.';
  if (pct >= 90) { grade='🏆'; gradeLabel='Mastery'; gradeSub='The Pale Drift bows before your knowledge.'; }
  else if (pct >= 75) { grade='⭐'; gradeLabel='Proficient'; gradeSub='Strong foundation. A few gaps remain.'; }
  else if (pct >= 60) { grade='📖'; gradeLabel='Developing'; gradeSub='You know more than you think. Keep drilling.'; }
  else if (pct >= 40) { grade='⚠️'; gradeLabel='Struggling'; gradeSub='Return to the Library. Re-read the notes.'; }

  render(`
    <div class="header"><h1>C.R.A.M — The Unbound</h1></div>
    <div class="pp-end-screen">
      <div class="pp-grade">${grade}</div>
      <div class="pp-grade-label">${gradeLabel}</div>
      <div class="pp-grade-sub">${gradeSub}</div>
      <div style="font-size:28px;color:#c8a2ff;margin-bottom:6px">${ppState.score} / ${ppState.total}</div>
      <div style="font-size:14px;color:#555;margin-bottom:28px">${pct}% accuracy</div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <button class="pp-start-btn" style="max-width:200px" onclick="ppState.active=false; startPPQuiz()">🔁 Try Again</button>
        <button class="abtn" data-t="navigation" style="max-width:200px" onclick="ppState.active=false; renderPastPapers()">← Back to Menu</button>
      </div>
    </div>
  `);
}


// ── Utils ──────────────────────────────────────────────────────────────────
function escHtml(s) {
  if (!s) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function escAttr(s) {
  if (!s) return "";
  return String(s).replace(/'/g,"\\'").replace(/"/g,'\\"');
}

// ── Init ───────────────────────────────────────────────────────────────────
renderStart();
</script>
</body>
</html>
