// ── Particles (arena atmosphere) ───────────────────────────────────────────
function generateParticles() {
  const colors = ['#c8a2ff','#9966cc','#6644aa','#4422aa','#aa66ff'];
  return Array.from({length:18},(_,i)=>{
    const x = (10+Math.random()*80).toFixed(1);
    const y = (10+Math.random()*80).toFixed(1);
    const delay = (Math.random()*5).toFixed(2);
    const dur = (3+Math.random()*3.5).toFixed(2);
    const color = colors[i%colors.length];
    const size = Math.random() > .7 ? 3 : 2;
    return `<div class="bp" style="--bx:${x}%;--by:${y}%;--bd:${delay}s;--pd:${dur}s;--bc:${color};width:${size}px;height:${size}px"></div>`;
  }).join('');
}

// ── Animation triggers ─────────────────────────────────────────────────────
function triggerFW(id, cls, ms) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.remove('attacking','plr-hit','enm-hit','enm-dying');
  void el.offsetWidth;
  el.classList.add(cls);
  if (cls !== 'enm-dying') setTimeout(()=>el.classList.remove(cls), ms);
}
function triggerPlayerAttack() { triggerFW('fwPlayer','attacking',580); }
function triggerPlayerHit()    { triggerFW('fwPlayer','plr-hit',680); }
function triggerEnemyHit()     { triggerFW('fwEnemy','enm-hit',580); }
function triggerEnemyDeath()   { triggerFW('fwEnemy','enm-dying',1500); }

// ── Combat ─────────────────────────────────────────────────────────────────
let combatInsightUses = 2;

async function beginCombat(info) {
  combatLocked    = false;
  isAnomalyCombat = !!(info.is_anomaly);

  // ── Anomaly: show warning screen before entering ──────────────────────────
  if (isAnomalyCombat) {
    render(`
      <div class="header"><h1>C.R.A.M — The Unbound</h1></div>
      ${playerBar()}
      <div class="anomaly-warning">
        <div class="aw-icon">⚠️</div>
        <div class="aw-title">ANOMALY DETECTED</div>
        <div class="aw-sub">The Pale Drift stirs in the rift.</div>
        <div class="aw-body">
          Anomaly combat uses the <b>hardest questions in the archive</b>.<br>
          Victory grants <b>legendary rewards</b>.<br>
          Defeat brands you with a <b>permanent debuff</b> — no exceptions.
        </div>
        <div class="aw-debuffs">Possible curses: Pale Mark · Shattered Focus · XP Curse · Void Wound</div>
        <div style="display:flex;gap:10px;justify-content:center;margin-top:18px">
          <button class="abtn" data-t="combat" onclick="doBeginCombat(window._pendingCombatInfo)">⚠️ Enter the Rift</button>
          <button class="abtn" data-t="navigation" onclick="renderOverworld()">← Retreat</button>
        </div>
      </div>
      ${renderLog()}
    `);
    window._pendingCombatInfo = info;
    return;
  }
  await doBeginCombat(info);
}

async function doBeginCombat(info) {
  const nodeSubtype = info.is_anomaly ? 'boss' : (info.subtype || 'guard');
  const r = await api("/start_combat","POST",{
    concept_id:      info.concept_id||null,
    weapon_id:       player.weapon_id || info.weapon_id || "none",
    armor_id:        player.armor_id  || info.armor_id  || "none",
    node_god:        info.god||null,
    node_modifiers:  [],
    bonus_insight:   player.insight||0,
    is_anomaly:      !!(info.is_anomaly),
    node_difficulty: info.difficulty||1,
    bonus_abilities: playerBonusAbilities || [],
  });
  if (!r) { renderOverworld(); return; }

  combatId          = r.session_id;
  combatRound       = r.round||1;
  combatStreak      = r.streak||0;
  combatInsightUses = r.insight_uses ?? 2;
  combatXpReward    = r.xp_reward || 30;
  isAnomalyCombat   = r.is_anomaly || false;
  combatEnemy       = {
    name:    r.enemy_name||"Enemy",
    concept: r.enemy_concept||"",
    subtype: r.enemy_subtype || nodeSubtype,
    tier:    r.question_tier || "standard",
  };
  combatHp = {
    player: r.player_hp, playerMax: r.player_max_hp,
    enemy:  r.enemy_hp,  enemyMax:  r.enemy_max_hp,
  };
  log(`⚔️ Combat! vs ${combatEnemy.name} | Weapon: ${r.weapon?.name||"none"} | Armor: ${r.armor?.name||"none"}`);
  renderCombat(r.question);
}

// ── Question type helpers ──────────────────────────────────────────────────
const Q_TYPE_LABELS = {
  multiple_choice: { label:"MCQ",    color:"#4a6fa5", icon:"🔲" },
  true_false:      { label:"T/F",    color:"#5a7a3a", icon:"⚖️" },
  define:          { label:"DEFINE", color:"#7a5a9a", icon:"📖" },
  short_exam:      { label:"SHORT",  color:"#8a6a2a", icon:"✏️" },
  long_exam:       { label:"ESSAY",  color:"#9a3a3a", icon:"📝" },
};
const TIER_LABELS = {
  standard: { label:"",        color:"transparent" },
  elite:    { label:"ELITE",   color:"#3a5a7a" },
  boss:     { label:"BOSS",    color:"#7a2a2a" },
  anomaly:  { label:"ANOMALY", color:"#4a1a6a" },
};

function renderQTypeBadge(q) {
  const qt = Q_TYPE_LABELS[q.type] || Q_TYPE_LABELS.multiple_choice;
  const tier = TIER_LABELS[q.tier] || TIER_LABELS.standard;
  const tierBadge = tier.label
    ? `<span class="qbadge" style="background:${tier.color}">${tier.label}</span>`
    : '';
  return `<span class="qbadge" style="background:${qt.color}">${qt.icon} ${qt.label}</span>${tierBadge}`;
}

function renderQuestionInput(q) {
  const type = q.type || 'multiple_choice';

  // True/False — 2 big buttons
  if (type === 'true_false') {
    return `<div class="boptgrid tf-grid">
      <button class="bopt tf-opt" id="optTrue"  onclick="submitAnswer('${escAttr(q.id)}','True')">✅ True</button>
      <button class="bopt tf-opt" id="optFalse" onclick="submitAnswer('${escAttr(q.id)}','False')">❌ False</button>
    </div>`;
  }

  // Multiple choice — 2-column grid
  if (type === 'multiple_choice') {
    return `<div class="boptgrid">
      ${(q.options||[]).map((opt,i)=>`
        <button class="bopt" id="opt${i}" onclick="submitAnswer('${escAttr(q.id)}','${escAttr(opt)}')">${escHtml(opt)}</button>
      `).join('')}
    </div>`;
  }

  // Open-ended: define / short_exam / long_exam
  const isLong = type === 'long_exam';
  return `<div class="open-q-wrap">
    ${type === 'define' ? `<div class="open-q-frame">Define the term or concept above in your own words.</div>` : ''}
    ${type === 'short_exam' ? `<div class="open-q-frame">Provide a concise answer (2–4 sentences).</div>` : ''}
    ${type === 'long_exam'  ? `<div class="open-q-frame">Write a detailed explanation or analysis.</div>` : ''}
    <textarea id="openAns" class="open-q-input ${isLong?'open-q-lg':''}"
      placeholder="Type your answer here..."
      onkeydown="if(event.ctrlKey&&event.key==='Enter')submitOpenAnswer('${escAttr(q.id)}')"></textarea>
    <button class="abtn open-q-submit" onclick="submitOpenAnswer('${escAttr(q.id)}')">Submit Answer →</button>
  </div>`;
}

function renderCombat(q) {
  if (!q) { endCombat(false); return; }

  const pp = pct(combatHp.player, combatHp.playerMax);
  const ep = pct(combatHp.enemy,  combatHp.enemyMax);
  const subtype = combatEnemy.subtype || 'guard';
  const isBoss  = subtype === 'boss';
  const wpnName = getActiveWeaponData()?.name || player.weapon_id || 'Unarmed';
  const armName = getActiveArmorData()?.name  || player.armor_id  || 'None';

  render(`
    <div class="header"><h1>C.R.A.M — The Unbound</h1></div>
    ${playerBar()}
    <div class="battle-wrap">

      <!-- ── Arena ── -->
      <div class="battle-arena">
        ${generateParticles()}
        <div class="battle-ground"></div>
        <div class="battle-fighters">

          <!-- Player -->
          <div class="fw" id="fwPlayer">
            <div class="fw-hprow">
              <div class="fw-name">CPT SHANYOK</div>
              <div class="fw-track"><div class="fw-fill plr" id="php" style="width:${pp}%"></div></div>
              <div class="fw-hpnum" id="phpnum">${combatHp.player}/${combatHp.playerMax}</div>
            </div>
            <div class="sp-area">
              <div class="sp-shadow"></div>
              ${getCptShantySpriteHTML()}
            </div>
          </div>

          <!-- Center -->
          <div class="bc">
            <div class="bc-round">ROUND ${combatRound}</div>
            <div class="bc-streak" id="sbar">${streakHtml()}</div>
            <div class="bc-equip">⚔ ${wpnName} &nbsp;🛡 ${armName}</div>
          </div>

          <!-- Enemy -->
          <div class="fw" id="fwEnemy">
            <div class="fw-hprow">
              <div class="fw-name">${combatEnemy.name.toUpperCase()}</div>
              <div class="fw-track"><div class="fw-fill enm" id="ehp" style="width:${ep}%"></div></div>
              <div class="fw-hpnum" id="ehpnum">${combatHp.enemy}/${combatHp.enemyMax}</div>
            </div>
            <div class="sp-area${isBoss?' boss-sz':''}">
              <div class="sp-shadow"></div>
              ${getEnemySprite(subtype)}
            </div>
          </div>

        </div>
      </div>

      <!-- ── Question box ── -->
      <div class="bqbox">
        ${isAnomalyCombat ? `<div class="anomaly-badge">⚠️ ANOMALY — Failure = Permanent Debuff</div>` : ''}
        <div class="bqconcept">${renderQTypeBadge(q)} ${combatEnemy.concept||''}</div>
        <div class="bqtext ${q.type==='long_exam'?'bqtext-lg':''}">${escHtml(q.question)}</div>
        ${renderQuestionInput(q)}
        <div class="bfoot">
          <button class="insight-btn" id="insightBtn" ${combatInsightUses<=0?"disabled":""} onclick="useInsight()">
            💡 Insight (${combatInsightUses} left)
          </button>
        </div>
        <div id="insightHint"></div>
        <!-- Answer feedback + proceed button render here -->
        <div id="expl" style="margin-top:10px;"></div>
      </div>

    </div>
    ${renderLog()}
  `);
}

function hpBarsHtml() {
  const pp = pct(combatHp.player, combatHp.playerMax);
  const ep = pct(combatHp.enemy, combatHp.enemyMax);
  return `
  <div class="hpbars">
    <div class="combatant player">
      <div class="name">You</div>
      <div class="hprow">
        <div class="bar"><div class="fill" id="php" style="width:${pp}%"></div></div>
        <div class="hpnum" id="phpnum">${combatHp.player}/${combatHp.playerMax}</div>
      </div>
    </div>
    <div class="vs">⚔️</div>
    <div class="combatant enemy">
      <div class="name">${combatEnemy.name}</div>
      <div class="hprow">
        <div class="bar"><div class="fill" id="ehp" style="width:${ep}%"></div></div>
        <div class="hpnum" id="ehpnum">${combatHp.enemy}/${combatHp.enemyMax}</div>
      </div>
    </div>
  </div>`;
}

function streakHtml() {
  if (combatStreak <= 0) return "";
  const flames = "🔥".repeat(Math.min(combatStreak,5));
  return `${flames} Streak ×${combatStreak}`;
}

function updateBars() {
  const pp = pct(combatHp.player, combatHp.playerMax);
  const ep = pct(combatHp.enemy, combatHp.enemyMax);
  const pEl = document.getElementById("php");
  const eEl = document.getElementById("ehp");
  const pNum = document.getElementById("phpnum");
  const eNum = document.getElementById("ehpnum");
  if (pEl) { pEl.style.width = pp+"%"; }
  if (eEl) { eEl.style.width = ep+"%"; }
  if (pNum) pNum.textContent = `${combatHp.player}/${combatHp.playerMax}`;
  if (eNum) eNum.textContent = `${combatHp.enemy}/${combatHp.enemyMax}`;
  const sb = document.getElementById("sbar");
  if (sb) sb.innerHTML = streakHtml();
}

// ── Open-ended question: show model answer then self-evaluate ─────────────
function submitOpenAnswer(qid) {
  if (combatLocked) return;
  const ta = document.getElementById("openAns");
  if (!ta) return;
  const userAnswer = ta.value.trim();
  if (!userAnswer) return;
  combatLocked = true;
  pendingOpenAnswer = { qid };
  ta.disabled = true;

  // Hide the submit button and show the model-answer panel
  const wrap = ta.closest(".open-q-wrap");
  if (wrap) {
    const submitBtn = wrap.querySelector(".open-q-submit");
    if (submitBtn) submitBtn.style.display = "none";
    // We need the model answer — call backend to evaluate with a placeholder
    // so we get back the correct_answer field, then show self-eval UI
    const modelPanel = document.createElement("div");
    modelPanel.className = "self-eval-panel";
    modelPanel.id = "selfEvalPanel";
    modelPanel.innerHTML = `<div class="sep-loading">Revealing answer...</div>`;
    wrap.appendChild(modelPanel);

    // Fetch model answer WITHOUT affecting combat state
    (async () => {
      const r = await api("/peek_answer","POST",{question_id:qid});
      const modelAns = r?.correct_answer || "(no answer available)";
      modelPanel.innerHTML = `
        <div class="sep-title">📖 Model Answer</div>
        <div class="sep-body">${escHtml(modelAns)}</div>
        ${r?.explanation ? `<div class="sep-expl">${escHtml(r.explanation)}</div>` : ''}
        <div class="sep-question">Did your answer capture the key ideas?</div>
        <div style="display:flex;gap:8px;margin-top:8px">
          <button class="bopt correct" style="flex:1" onclick="selfEvaluate('${escAttr(qid)}',true)">✅ I got it</button>
          <button class="bopt wrong"  style="flex:1" onclick="selfEvaluate('${escAttr(qid)}',false)">❌ I missed it</button>
        </div>
      `;
      combatLocked = false;
    })();
  }
}

async function selfEvaluate(qid, correct) {
  if (combatLocked) return;
  combatLocked = true;
  document.querySelectorAll(".bopt").forEach(b => b.disabled = true);
  await _processAnswer(qid, correct ? "self:correct" : "self:incorrect");
}

async function submitAnswer(qid, answer) {
  if (combatLocked) return;
  combatLocked = true;
  document.querySelectorAll(".bopt").forEach(b => b.disabled = true);
  await _processAnswer(qid, answer);
}

async function _processAnswer(qid, answer) {
  const _answerEndpoint = isTutorialMode ? "/api/tutorial/answer" : "/answer";
  const r = await api(_answerEndpoint,"POST",{session_id:combatId, question_id:qid, answer:answer});
  if (!r) { combatLocked = false; return; }

  // ── Update HP ─────────────────────────────────────────────────────────────
  combatHp.player = r.player_hp;
  combatHp.enemy  = r.enemy_hp;
  combatStreak    = r.streak||0;
  combatRound     = r.round||combatRound;
  updateBars();

  // ── Highlight answers (only for button-based questions) ───────────────────
  document.querySelectorAll(".bopt").forEach(btn => {
    const t = btn.textContent.trim();
    const isSelfEval = answer.startsWith("self:");
    if (!isSelfEval) {
      if (t === answer.trim())                 btn.classList.add(r.correct ? "correct" : "wrong");
      if (t === r.correct_answer && !r.correct) btn.classList.add("correct");
    }
  });

  // ── Animations + damage pops ───────────────────────────────────────────────
  const eEl = document.getElementById("ehp");
  const pEl = document.getElementById("php");
  if (r.correct && r.damage_dealt > 0) {
    triggerPlayerAttack();
    setTimeout(() => triggerEnemyHit(), 220);
    dmgPop(`-${r.damage_dealt}`, "good", eEl);
    log(`✅ Correct! Dealt ${r.damage_dealt} dmg. Streak ×${combatStreak}`);
  } else if (!r.correct) {
    triggerPlayerHit();
    if (r.enemy_damage > 0) dmgPop(`-${r.enemy_damage}`, "bad", pEl);
    log(`❌ Wrong. Took ${r.enemy_damage||0} dmg. Streak broken.`);
  }
  if (r.streak_feedback) {
    const sb = document.getElementById("sbar");
    if (sb) sb.innerHTML = `<span style="color:#f1c40f">${r.streak_feedback}</span>`;
  }

  // ── Show explanation + correct answer reveal (wrong) ─────────────────────
  const explEl = document.getElementById("expl");
  if (explEl) {
    let html = '';
    if (r.explanation) {
      html += `<div class="expl ${r.correct?'good':'bad'}">${escHtml(r.explanation)}</div>`;
    }
    if (!r.correct && r.correct_answer) {
      html += `<div class="correct-reveal">✅ <strong>Correct answer:</strong> ${escHtml(r.correct_answer)}</div>`;
    }
    explEl.innerHTML = html;
  }

  // ── Combat over? ──────────────────────────────────────────────────────────
  if (r.combat_over) {
    if (r.correct) {
      // Correct killing blow — auto-proceed after brief glory moment
      triggerEnemyHit();
      setTimeout(() => triggerEnemyDeath(), 380);
      setTimeout(() => endCombat(true), 1800);
    } else {
      // Wrong answer killed player — show button so they can read the correct answer first
      triggerPlayerHit();
      if (explEl) {
        explEl.innerHTML += `<button class="combat-proceed wrong-proceed" onclick="_resolveCombatOver(false)">💀 I understand — Continue →</button>`;
      } else {
        setTimeout(() => endCombat(false), 800);
      }
    }
    return;
  }

  // ── Next question ─────────────────────────────────────────────────────────
  const next = r.next_question;
  window._pendingNextQuestion = next;

  if (r.correct) {
    // Correct answer → auto-advance immediately (keep the streak flowing)
    combatLocked = false;
    if (next && next.question) {
      renderCombat(next);
    } else {
      endCombat(true);
    }
  } else {
    // Wrong answer → show proceed button so player can actually read and learn
    if (explEl) {
      explEl.innerHTML += `<button class="combat-proceed wrong-proceed" onclick="_advanceCombat()">→ Got it, next question</button>`;
    } else {
      // No expl element fallback
      setTimeout(() => { combatLocked = false; next && next.question ? renderCombat(next) : endCombat(true); }, 2000);
    }
  }
}

function _advanceCombat() {
  combatLocked = false;
  const next = window._pendingNextQuestion;
  window._pendingNextQuestion = null;
  if (next && next.question) {
    renderCombat(next);
  } else {
    log("No more questions — combat ends");
    endCombat(true);
  }
}

function _resolveCombatOver(victory) {
  if (victory) {
    triggerEnemyHit();
    setTimeout(() => triggerEnemyDeath(), 380);
    setTimeout(() => endCombat(true), 1200);
  } else {
    triggerPlayerHit();
    setTimeout(() => endCombat(false), 800);
  }
}

async function endCombat(victory) {
  // Sync player HP from combat state
  const diff = player.hp - combatHp.player;
  if (diff > 0) {
    await api("/api/game/damage","POST",{session_id:gameId, amount:diff});
  }

  let xpGained = 0;
  let levelUp  = false;
  let debuff   = null;

  if (victory) {
    // Use server-determined XP reward (scales with enemy tier)
    xpGained = combatXpReward;
    const xpR = await api("/api/game/xp","POST",{session_id:gameId, amount:xpGained});
    if (xpR?.level_up) { levelUp = true; }
  } else if (isAnomalyCombat) {
    // Anomaly loss → permanent debuff
    const dr = await api("/api/game/anomaly/debuff","POST",{session_id:gameId});
    if (dr?.debuff) debuff = dr.debuff;
  }

  await syncPlayer();
  checkAndGrantUnlocks();

  // ── Check for weapon tier upgrade ──────────────────────────────────────────
  if (playerPath && levelUp) {
    const lvl = player.level;
    // Weapon: T2 at level 4, T3 at level 7
    if (lvl >= WEAPON_TIER_LEVELS[1] && playerWeaponTier === 0) {
      pendingWeaponUpgrade = 1;
    } else if (lvl >= WEAPON_TIER_LEVELS[2] && playerWeaponTier === 1) {
      pendingWeaponUpgrade = 2;
    }
    // Armor: auto-upgrade at level 3 and 6 (no player choice)
    if (lvl >= ARMOR_TIER_LEVELS[1] && playerArmorTier === 0) {
      playerArmorTier = 1;
      const a = getActiveArmorData();
      player.armor_id = a.armor_id;
      await api("/api/game/equip","POST",{ session_id:gameId, armor_id:a.armor_id });
      log(`🛡️ Armor upgraded: ${a.name} — ${a.stat}`);
      showUnlockToast(`Armor: ${a.name}`);
    } else if (lvl >= ARMOR_TIER_LEVELS[2] && playerArmorTier === 1) {
      playerArmorTier = 2;
      const a = getActiveArmorData();
      player.armor_id = a.armor_id;
      await api("/api/game/equip","POST",{ session_id:gameId, armor_id:a.armor_id });
      log(`🛡️ Armor upgraded: ${a.name} — ${a.stat}`);
      showUnlockToast(`Armor: ${a.name}`);
    }
  }

  const isAnomaly = isAnomalyCombat;
  const borderCol = victory
    ? (isAnomaly ? '#4a1a6a' : '#1a4a1a')
    : (isAnomaly ? '#6a0a0a' : '#4a1a1a');
  const bgGrad = victory
    ? (isAnomaly
        ? 'linear-gradient(175deg,#050012,#0a0020,#100830)'
        : 'linear-gradient(175deg,#020a02,#041204,#081a08)')
    : (isAnomaly
        ? 'linear-gradient(175deg,#120000,#1a0002,#200008)'
        : 'linear-gradient(175deg,#080002,#120004,#1a0208)');
  const brTitle = victory
    ? (isAnomaly ? '✨ Rift Conquered' : '🏆 Victory')
    : (isAnomaly ? '💀 Branded by the Drift' : '💀 Defeated');
  const subtext = victory
    ? (isAnomaly
        ? `The Pale Drift recoils. You claim its forbidden knowledge.`
        : `The ${combatEnemy.name} falls. Knowledge is power.`)
    : (isAnomaly
        ? `The Pale Drift has marked you. Its curse is permanent.`
        : 'The enemy overwhelms you. You retreat to the shadows.');
  const statsLine = `${combatRound} round${combatRound!==1?'s':''} fought`;

  const debuffHtml = debuff ? `
    <div class="debuff-result">
      <div class="dr-icon">${debuff.icon}</div>
      <div class="dr-name">${debuff.name}</div>
      <div class="dr-desc">${debuff.desc}</div>
    </div>
  ` : '';

  const actionBtn = victory
    ? `<button class="abtn" data-t="navigation" onclick="afterCombat()" style="max-width:240px;margin:0 auto">← Return to Overworld</button>`
    : `<div style="display:flex;flex-direction:column;gap:10px;align-items:center;width:100%;max-width:280px;margin:0 auto">
        <button class="abtn" data-t="combat" onclick="resetRun()" style="width:100%;background:#1a0505;border-color:#6a1a1a;color:#ff6666;letter-spacing:1px">
          💀 Accept Death — Start Over
        </button>
        <div style="color:#2a1a1a;font-size:11px;text-align:center">Your run ends here. All progress is lost.</div>
       </div>`;

  render(`
    <div class="header"><h1>C.R.A.M — The Unbound</h1></div>
    ${victory ? playerBar() : ''}
    <div class="battle-result" style="border-color:${borderCol};background:${bgGrad}">
      <div class="br-title">${brTitle}</div>
      <div class="br-sub">${subtext}</div>
      ${xpGained ? `<div class="br-xp">+${xpGained} XP${levelUp ? ' &nbsp;·&nbsp; <b style="color:#fff">LEVEL UP!</b>' : ''}</div>` : ''}
      ${debuffHtml}
      <div style="color:#333;font-size:11px;margin-bottom:24px">${statsLine}</div>
      ${actionBtn}
    </div>
    ${renderLog()}
  `);

  if (levelUp) showLevelUp(player.level);
}

async function afterCombat() {
  combatId = null;
  combatLocked = false;

  // Tutorial mode — handled by the tutorial afterCombat function defined above
  if (isTutorialMode) {
    // afterCombat for tutorial is defined in the Tutorial System section above
    // Mark node cleared and advance
    if (_currentNodeId && tutorialWorld && tutorialWorld[_currentNodeId]) {
      tutorialWorld[_currentNodeId].state = 'cleared';
    }
    const _order = ['citadel','tut_combat_1','tut_tavern','tut_combat_2','tut_boss'];
    const _idx   = _order.indexOf(_currentNodeId);
    if (_idx >= 0 && _idx < _order.length - 1) curNode = _order[_idx + 1];

    const _postDialogues = {
      tut_combat_1: SIR_GETRICH_DIALOGUES.after_first_combat,
      tut_combat_2: SIR_GETRICH_DIALOGUES.after_second_combat,
      tut_boss:     SIR_GETRICH_DIALOGUES.tutorial_complete,
    };
    const _lines = _postDialogues[_currentNodeId];

    if (_currentNodeId === 'tut_boss') {
      renderTutorialComplete();
      if (_lines) setTimeout(() => showTutorDialogue(_lines, null), 500);
      return;
    }
    if (pendingWeaponUpgrade !== null) {
      if (_lines) showTutorDialogue(_lines, () => renderWeaponUpgrade(pendingWeaponUpgrade));
      else renderWeaponUpgrade(pendingWeaponUpgrade);
    } else {
      renderTutorialOverworld();
      if (_lines) setTimeout(() => showTutorDialogue(_lines, null), 400);
    }
    return;
  }

  // Normal mode
  if (pendingWeaponUpgrade !== null) {
    const tier = pendingWeaponUpgrade;
    renderWeaponUpgrade(tier);
  } else {
    renderOverworld();
  }
}

function resetRun() {
  // Wipe all run state — gear and path reset on death
  gameId        = null;
  world         = null;
  curNode       = null;
  combatId      = null;
  combatLocked  = false;
  combatRound   = 1;
  combatStreak  = 0;
  isAnomalyCombat = false;
  combatXpReward  = 30;
  playerDebuffs        = [];
  playerUpgrades       = [];
  playerPath           = null;
  playerArmorPath      = null;
  playerWeaponTier     = 0;
  playerArmorTier      = 0;
  playerWeaponChoices  = [];
  playerBonusAbilities = [];
  pendingWeaponUpgrade = null;
  pendingOpenAnswer    = null;
  navBack              = null;
  logs                 = [];
  _libraryData         = null;
  isTutorialMode       = false;
  tutorialWorld        = null;
  tutorialStep         = 0;
  hideTutorDialogue();
  player = { level:1, xp:0, hp:100, max_hp:100, insight:0, weapon_id:'none', armor_id:'none' };
  renderStart();
}

function showLevelUp(level) {
  const el = document.createElement("div");
  el.className = "levelup-flash";
  el.textContent = `⬆️ LEVEL ${level}!`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2600);
}

// ── Insight ────────────────────────────────────────────────────────────────
async function useInsight() {
  if (combatInsightUses <= 0) return;
  const r = await api("/insight","POST",{session_id:combatId});
  if (!r) return;
  combatInsightUses = r.insight_uses ?? combatInsightUses - 1;
  const btn = document.getElementById("insightBtn");
  if (btn) {
    btn.textContent = `💡 Use Insight (${combatInsightUses} left)`;
    if (combatInsightUses <= 0) btn.disabled = true;
  }
  const hintEl = document.getElementById("insightHint");
  if (hintEl) {

async function renderCodex(backFn) {
  // Save back destination
  navBack = backFn || (gameId ? renderOverworld : renderStart);

  if (!gameId) {
    render(`
      <div class="header"><h1>C.R.A.M — The Unbound</h1></div>
      <button class="back-btn" onclick="goBack()">← Back</button>
      <div class="codex-tabs">
        <button class="codex-tab active" id="ctab-journal"  onclick="switchCodexTab('journal')">📕 Mistake Journal</button>
        <button class="codex-tab"        id="ctab-bestiary" onclick="switchCodexTab('bestiary')">🐉 Bestiary</button>
      </div>
      <div id="cpanel-journal" class="codex-panel">
        <h2>📕 Codex — Mistake Journal</h2>
        <div class="codex-sub">Your mistakes from this run will appear here. Start a run first.</div>
        <div class="codex-empty">No active session. Begin a run to start tracking.</div>
      </div>
      <div id="cpanel-bestiary" class="codex-panel" style="display:none">
        <h2>🐉 Bestiary — Enemy Compendium</h2>
        <div class="codex-sub">All known entities of the Unbound World. Tap an entry to reveal its stats.</div>
        ${renderBestiaryHTML()}
      </div>
    `);
    return;
  }

  render(`
    <div class="header"><h1>C.R.A.M — The Unbound</h1></div>
    <button class="back-btn" onclick="goBack()">← Back</button>
    <div class="codex-panel"><div class="codex-sub" style="color:#444">Loading codex…</div></div>
  `);

  const [all, mistakes] = await Promise.all([
    api(`/codex/${gameId}`),
    api(`/codex/${gameId}/mistakes`),
  ]);

  const entries    = all?.entries     || [];
  const wrongOnes  = mistakes?.entries || [];
  const accuracy   = entries.length > 0
    ? Math.round(((entries.length - wrongOnes.length) / entries.length) * 100)
    : null;

  const rowsHtml = entries.length === 0
    ? `<tr><td colspan="5" class="codex-empty">No questions answered yet this run.</td></tr>`
    : entries.map(e => {
        const ok = e.correct;
        return `<tr>
          <td>${escHtml(e.concept_id || '—')}</td>
          <td>${escHtml(e.question_text?.substring(0,60) || e.question_id || '—')}${(e.question_text?.length||0)>60?'…':''}</td>
          <td class="${ok?'codex-ok':'codex-bad'}">${escHtml(e.selected_answer || '—')}</td>
          <td class="codex-ok">${escHtml(e.correct_answer || '—')}</td>
          <td>${escHtml(e.explanation?.substring(0,80)||'—')}${(e.explanation?.length||0)>80?'…':''}</td>
        </tr>`;
      }).join('');

  render(`
    <div class="header"><h1>C.R.A.M — The Unbound</h1></div>
    <button class="back-btn" onclick="goBack()">← Back</button>
    ${playerBar()}
    <div class="codex-tabs">
      <button class="codex-tab active" id="ctab-journal"   onclick="switchCodexTab('journal')">📕 Mistake Journal</button>
      <button class="codex-tab"        id="ctab-bestiary"  onclick="switchCodexTab('bestiary')">🐉 Bestiary</button>
    </div>

    <!-- Mistake Journal -->
    <div id="cpanel-journal" class="codex-panel">
      <h2>📕 Codex — Mistake Journal</h2>
      <div class="codex-sub">
        ${entries.length} questions answered this run.
        ${wrongOnes.length} mistakes.
        ${accuracy !== null ? `Accuracy: <b style="color:#88cc88">${accuracy}%</b>` : ''}
      </div>
      ${wrongOnes.length > 0 ? `
        <div style="background:#1a0a0a;border:1px solid #3a1a1a;border-radius:6px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:#c88">
          ⚠️ Weakest concept this run: <b>${getMostMistaken(wrongOnes)}</b>
        </div>` : ''}
      <div style="overflow-x:auto">
        <table class="codex-table">
          <thead><tr>
            <th>Concept</th><th>Question</th><th>Your Answer</th><th>Correct Answer</th><th>Explanation</th>
          </tr></thead>
          <tbody>${rowsHtml}</tbody>
        </table>
      </div>
    </div>

    <!-- Bestiary -->
    <div id="cpanel-bestiary" class="codex-panel" style="display:none">
      <h2>🐉 Bestiary — Enemy Compendium</h2>
      <div class="codex-sub">All known entities of the Unbound World. Tap an entry to reveal its stats.</div>
      ${renderBestiaryHTML()}
    </div>

    ${gameId ? renderLog() : ''}
  `);
}

function getMostMistaken(wrongEntries) {
  const counts = {};
  wrongEntries.forEach(e => {
    const c = e.concept_id || e.question_id?.split('_')[0] || 'unknown';
    counts[c] = (counts[c]||0) + 1;
  });
  return Object.entries(counts).sort((a,b)=>b[1]-a[1])[0]?.[0] || 'unknown';
}

function switchCodexTab(tab) {
  ['journal','bestiary'].forEach(t => {
    const btn = document.getElementById('ctab-'+t);
    const pnl = document.getElementById('cpanel-'+t);
    if (btn) btn.classList.toggle('active', t===tab);
    if (pnl) pnl.style.display = t===tab ? '' : 'none';
  });
}

function getActiveWeaponData() {

// Resolve which tier data to show for a given tier index on a weapon path
function getWeaponTierData(path, tierIdx, choiceIdx) {
  const tier = WEAPON_PATHS[path].tiers[tierIdx];
  if (tierIdx === 0) return tier;
  return tier.options[choiceIdx ?? 0];
}

// Placeholder catalogs so any legacy code that references WEAPONS_CATALOG/ARMORS_CATALOG
// doesn't crash — resolved from active path where needed
const WEAPONS_CATALOG = {};
const ARMORS_CATALOG  = {};

// ── Upgrade unlock system (passives only — gear is path-based now) ────────────
const UNLOCKS_KEY = 'cram_unlocks';

function getUnlocks() {
  try { const r = localStorage.getItem(UNLOCKS_KEY); return r ? new Set(JSON.parse(r)) : new Set(); }
  catch(_) { return new Set(); }
}
function saveUnlocks(s) { try { localStorage.setItem(UNLOCKS_KEY, JSON.stringify([...s])); } catch(_) {} }
function isUnlocked(id) { return getUnlocks().has(id); }

// Called after syncPlayer — checks level against passive upgrade thresholds
function checkAndGrantUnlocks() {
  const unlocks = getUnlocks();
  const newItems = [];
  const lvl = player.level || 1;
  for (const [id, u] of Object.entries(UPGRADES_CATALOG)) {
    if (!unlocks.has(id) && lvl >= (u.unlock_level || 0)) {
      unlocks.add(id); newItems.push(u.name);
    }
  }
  if (newItems.length) { saveUnlocks(unlocks); newItems.forEach(n => showUnlockToast(n)); }
}

function showUnlockToast(itemName) {
  const el = document.createElement('div');
  el.style.cssText = `position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
    background:#0d1a0d;border:1px solid #2a6a2a;border-radius:8px;padding:10px 20px;
    color:#6fd86f;font-size:13px;font-weight:600;z-index:2000;pointer-events:none;
    text-align:center;animation:fadeInUp 0.3s ease, fadeOut 0.5s ease 2.2s forwards;`;
  el.textContent = `🔓 Passive Unlocked: ${itemName}`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2800);
}

async function tavernAction(action) {
  const r = await api("/api/game/node/action","POST",{session_id:gameId, action_id: action === 'rest' ? 'rest' : 'save'});
  const msg = document.getElementById("tavern-msg");
  if (r?.type === 'heal') {
    await syncPlayer();
    if (msg) msg.innerHTML = `<div class="rbox good">❤️ ${r.message||'Healed!'}</div>`;
    log(`❤️ Rested at tavern — full HP`);
  } else if (r?.type === 'save_prompt') {
    if (msg) msg.innerHTML = `<div class="rbox info">💾 ${r.message||'Saved.'}</div>`;
  }
  // Re-render tavern to update player bar
  setTimeout(async () => {
    await syncPlayer();
    if (window._tavernNode) renderTavern(window._tavernNode);
  }, 1200);
}

async function renderUpgrades(backFn) {
  navBack = backFn || renderOverworld;
  const unlocks = getUnlocks();

  const cards = Object.entries(UPGRADES_CATALOG).map(([id, u]) => {
    const unlocked  = unlocks.has(id);
    const owned     = playerUpgrades.includes(id);
    const canAfford = player.insight >= u.cost;

    if (!unlocked) {
      return `
        <div class="upgrade-card locked-card">
          <div class="uc-icon" style="filter:grayscale(1);opacity:0.3">🔒</div>
          <div class="uc-name" style="color:#2a2a3a">???</div>
          <div class="uc-desc" style="color:#2a2a3a">Locked passive</div>
          <div class="uc-cost" style="color:#3a3a5a">🔒 Reach Level ${u.unlock_level}</div>
        </div>`;
    }

    const cls = owned ? 'owned' : (!canAfford ? 'cant-afford' : '');
    return `
      <div class="upgrade-card ${cls}" onclick="${owned || !canAfford ? '' : `buyUpgrade('${id}')`}">
        <div class="uc-icon">${u.icon}</div>
        <div class="uc-name">${escHtml(u.name)}</div>
        <div class="uc-desc">${escHtml(u.desc)}</div>
        <div class="uc-desc" style="color:#4a3a2a;font-style:italic">"${escHtml(u.flavor)}"</div>
        ${owned
          ? `<div class="uc-owned">✓ Active this run</div>`
          : `<div class="uc-cost">${u.cost} 💡 Insight${!canAfford ? ' — insufficient' : ''}</div>`
        }
      </div>`;
  }).join('');

  render(`
    <div class="header"><h1>C.R.A.M — The Unbound</h1></div>
    <button class="back-btn" onclick="goBack()">← Back</button>
    ${playerBar()}
    <div style="background:#07060e;border:1px solid #1a1428;border-radius:10px;padding:18px;margin-bottom:14px">
      <h2 style="color:#c8a2ff;margin-bottom:4px">⚗️ Passive Abilities</h2>
      <p style="color:#4a3a6a;font-size:12px;margin-bottom:16px">Level up to unlock passives. Spend 💡 Insight to activate them for this run — they reset on death.</p>
      <div class="upgrade-grid">${cards}</div>
      <div id="upgrade-msg"></div>
    </div>
    ${renderLog()}
  `);
}

async function buyUpgrade(id) {
  const u = UPGRADES_CATALOG[id];
  if (!u || !gameId) return;
  if (!isUnlocked(id)) { log(`🔒 ${u.name} not yet unlocked (need Level ${u.unlock_level}).`); return; }
  if (player.insight < u.cost) { log(`💡 Need ${u.cost} Insight, you have ${player.insight}.`); return; }
  const r = await api("/api/game/upgrade","POST",{
    session_id: gameId,
    upgrade_id: id,
    cost_type: "insight",
    cost_amount: u.cost,
  });
  if (!r) return;
  playerUpgrades = r.upgrades || playerUpgrades;
  await syncPlayer();
  log(`⚗️ Activated: ${u.name}`);
  renderUpgrades(navBack);
}

// ── Renders raw PDF cards for the Ancient Library tab ───────────────────────
// Accepts pdf_groups: [{folder, folder_name, pdfs:[{name,filename,url,size_kb}]}]
function renderLibraryPDFsHTML(pdfGroups) {
  const groups = pdfGroups || [];
  const totalPdfs = groups.reduce((n, g) => n + g.pdfs.length, 0);

  if (totalPdfs === 0) {
    return `
      <div class="pdf-empty-msg">
        <h3>📂 No PDFs Found</h3>
        <p>Drop <code>.pdf</code> files into any subject folder to view them here.</p>
        <p style="margin-top:8px;font-size:12px;color:#3a2a50">
          e.g. <code>subjects/dsa2/exam_2023.pdf</code> or <code>subjects/svv/notes.pdf</code>
        </p>
      </div>`;
  }

  // Flat index for unique IDs across all groups
  let globalIdx = 0;

  // ── Tab buttons row ──────────────────────────────────────────────────────
  const tabBtns = groups.map((group, gi) =>
    `<button
       class="lib-subject-tab${gi === 0 ? ' active' : ''}"
       onclick="switchLibSubjectTab(${gi}, ${groups.length})"
       id="lib-stab-${gi}">
       📂 ${escHtml(group.folder_name)}
       <span style="font-size:10px;opacity:0.65;margin-left:4px">(${group.pdfs.length})</span>
     </button>`
  ).join('');

  // ── Tab content panels ───────────────────────────────────────────────────
  const tabPanels = groups.map((group, gi) => {
    const pdfCards = group.pdfs.map(pdf => {
      const idx = globalIdx++;
      // Build absolute URL so play.html opened as file:// can reach the server
      // pdf.url is like "/subjects/dsa2/file.pdf" — prepend API base + encode each filename segment
      const encodedUrl = API + '/' + pdf.url.split('/').filter(s => s !== '').map(seg => encodeURIComponent(seg)).join('/');
      const safeUrl  = escHtml(encodedUrl);
      const safeName = escHtml(pdf.name);
      return `
        <div class="pdf-card" id="pdfcard-${idx}">
          <div class="pdf-card-header">
            <span class="pdf-card-icon">📄</span>
            <div class="pdf-card-info">
              <div class="pdf-card-name">${safeName}</div>
              <div class="pdf-card-meta">${pdf.size_kb ? pdf.size_kb + ' KB' : ''}</div>
            </div>
            <div style="display:flex;gap:6px;flex-shrink:0">
              <button class="pdf-card-btn" id="pdfbtn-${idx}" onclick="togglePDFViewer(${idx}, '${safeUrl}', '${safeName}')">
                📖 View
              </button>
              <a class="pdf-card-btn" href="${safeUrl}" target="_blank" style="text-decoration:none;display:inline-flex;align-items:center">
                ↗ Tab
              </a>
            </div>
          </div>
          <div id="pdfview-${idx}" class="pdf-viewer-wrap" style="display:none">
            <div class="pdf-viewer-toolbar">
              <span class="pdf-viewer-title" id="pdftitle-${idx}">📄 ${safeName}</span>
              <div style="display:flex;gap:6px;align-items:center">
                <span id="pdfpages-${idx}" style="color:#5a4a7a;font-size:11px"></span>
                <a class="pdf-viewer-close" href="${safeUrl}" target="_blank" style="text-decoration:none">↗ Open in tab</a>
                <button class="pdf-viewer-close" onclick="togglePDFViewer(${idx}, '${safeUrl}', '${safeName}')">✕ Close</button>
              </div>
            </div>
            <div id="pdfcanvas-${idx}" class="pdf-canvas-wrap"></div>
          </div>
        </div>`;
    }).join('');

    return `
      <div class="lib-subject-panel" id="lib-spanel-${gi}" style="display:${gi === 0 ? 'block' : 'none'}">
        ${pdfCards}
      </div>`;
  }).join('');

  return `
    <div class="pdf-library">
      <div class="lib-subject-tabs">${tabBtns}</div>
      <div class="lib-subject-content">${tabPanels}</div>
    </div>`;
}

function switchLibSubjectTab(activeIdx, total) {
  for (let i = 0; i < total; i++) {
    const btn   = document.getElementById('lib-stab-' + i);
    const panel = document.getElementById('lib-spanel-' + i);
    if (btn)   btn.classList.toggle('active', i === activeIdx);
    if (panel) panel.style.display = i === activeIdx ? 'block' : 'none';
  }
}

// ── PDF.js viewer ─────────────────────────────────────────────────────────────
// Set the worker source once PDF.js is loaded
function _initPDFjs() {
  if (typeof pdfjsLib !== 'undefined' && !pdfjsLib.GlobalWorkerOptions.workerSrc) {
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }
}

function togglePDFViewer(idx, url, name) {
  const wrap = document.getElementById('pdfview-' + idx);
  const btn  = document.getElementById('pdfbtn-' + idx);
  if (!wrap) return;
  const opening = wrap.style.display === 'none';
  wrap.style.display = opening ? '' : 'none';
  if (btn) btn.textContent = opening ? '📖 Close' : '📖 View';
  if (opening) {
    const container = document.getElementById('pdfcanvas-' + idx);
    // Only render once
    if (container && !container.getAttribute('data-loaded')) {
      container.setAttribute('data-loaded', '1');
      renderPDFWithPDFjs(container, url, idx);
    }
  }
}

async function renderPDFWithPDFjs(container, url, idx) {
  _initPDFjs();
  if (typeof pdfjsLib === 'undefined') {
    container.innerHTML = `<div style="padding:24px;text-align:center;color:#7a6a3a">
      PDF.js not loaded. <a href="${url}" target="_blank" style="color:#aaa8ff">Open in new tab ↗</a></div>`;
    return;
  }

  container.innerHTML = `<div style="padding:24px;text-align:center;color:#5a4a7a">
    <div style="font-size:24px;margin-bottom:8px">⏳</div>Loading PDF…</div>`;

  try {
    const loadingTask = pdfjsLib.getDocument(url);
    const pdf = await loadingTask.promise;

    const pagesEl = document.getElementById('pdfpages-' + idx);
    if (pagesEl) pagesEl.textContent = `${pdf.numPages} page${pdf.numPages !== 1 ? 's' : ''}`;

    container.innerHTML = '';

    // Render pages sequentially
    for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
      const page = await pdf.getPage(pageNum);

      // Scale to fill the container width (max ~900px)
      const containerW = container.clientWidth || 800;
      const unscaled   = page.getViewport({ scale: 1 });
      const scale      = Math.min((containerW - 8) / unscaled.width, 2.2);
      const viewport   = page.getViewport({ scale });

      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'position:relative;margin-bottom:6px;border-radius:4px;overflow:hidden;background:#fff';

      const canvas = document.createElement('canvas');
      canvas.width  = Math.floor(viewport.width);
      canvas.height = Math.floor(viewport.height);
      canvas.style.cssText = 'display:block;width:100%;';
      wrapper.appendChild(canvas);

      // Page number label
      const label = document.createElement('div');
      label.textContent = `Page ${pageNum} / ${pdf.numPages}`;
      label.style.cssText = 'position:absolute;bottom:4px;right:8px;font-size:10px;color:#888;background:rgba(0,0,0,0.4);padding:1px 6px;border-radius:4px;pointer-events:none';
      wrapper.appendChild(label);

      container.appendChild(wrapper);

      await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
    }
  } catch (err) {
    console.error('PDF.js error:', err);
    container.innerHTML = `<div style="padding:24px;text-align:center;color:#cc7766">
      <div style="font-size:20px;margin-bottom:8px">⚠️</div>
      Could not render PDF.<br>
      <a href="${url}" target="_blank" style="color:#aaaaff;font-size:13px">↗ Open in new tab instead</a>
    </div>`;
  }
}

async function startPPQuiz() {
  if (ppState.active) { renderPPQuizScreen(); return; }
  ppState.active  = true;
  ppState.score   = 0;
  ppState.total   = 0;
  ppState.seenIds = [];
  ppState.locked  = false;
  ppState.filters = {
    concept: document.getElementById('pp-concept')?.value || '',
    type:    document.getElementById('pp-type')?.value    || '',
    tier:    document.getElementById('pp-tier')?.value    || '',
  };
  navBack = null; // lock back while quiz is active
  await loadNextPPQuestion();
}

async function loadNextPPQuestion() {
  const q = await api("/api/past_papers/question","POST",{
    concept_id:    ppState.filters.concept || null,
    question_type: ppState.filters.type    || null,
    tier:          ppState.filters.tier    || null,
    seen_ids:      ppState.seenIds,
  });
  if (!q) {
    renderPPEnd();
    return;
  }
  ppState.currentQ = q;
  ppState.seenIds.push(q.id);
  renderPPQuizScreen();
}

function renderPPQuizScreen() {
  const q = ppState.currentQ;
  if (!q) { renderPPEnd(); return; }

  render(`
    <div class="header"><h1>C.R.A.M — The Unbound</h1></div>
    <div class="pp-quiz-header">
      <div class="pp-quiz-score">📜 ${ppState.score} / ${ppState.total}</div>
      <div class="pp-quiz-meta">
        <div style="color:#3a7a3a">✓ ${ppState.score} correct</div>
        <div style="color:#7a3a3a">✗ ${ppState.total - ppState.score} wrong</div>
      </div>
      <button class="back-btn" style="margin:0" onclick="confirmQuitPP()">✕ Quit</button>
    </div>

    <div class="pp-qbox">
      <div class="pp-concept-tag">${renderQTypeBadge(q)} &nbsp;${escHtml(q.concept||'')}</div>
      <div class="pp-question ${q.type==='long_exam'?'bqtext-lg':''}">${escHtml(q.question)}</div>
      ${renderPPInput(q)}
      <div id="pp-result"></div>
    </div>
  `);
}

function renderPPInput(q) {
  const type = q.type || 'multiple_choice';
  if (type === 'true_false') {
    return `<div class="boptgrid tf-grid">
      <button class="bopt tf-opt" id="ppOptTrue"  onclick="submitPPAnswer('True')">✅ True</button>
      <button class="bopt tf-opt" id="ppOptFalse" onclick="submitPPAnswer('False')">❌ False</button>
    </div>`;
  }
  if (type === 'multiple_choice') {
    return `<div class="boptgrid">
      ${(q.options||[]).map((opt,i)=>`
        <button class="bopt" id="ppOpt${i}" onclick="submitPPAnswer('${escAttr(opt)}')">${escHtml(opt)}</button>
      `).join('')}
    </div>`;
  }
  // Open-ended
  return `<div class="open-q-wrap">
    <div class="open-q-frame">${type==='define'?'Define the term or concept above.':type==='short_exam'?'Give a concise answer (2–4 sentences).':'Write a detailed explanation.'}</div>
    <textarea id="ppOpenAns" class="open-q-input ${type==='long_exam'?'open-q-lg':''}" placeholder="Type your answer…"></textarea>
    <button class="abtn open-q-submit" onclick="showPPModelAnswer()">Submit Answer →</button>
  </div>`;
}

async function submitPPAnswer(answer) {
  if (ppState.locked) return;
  ppState.locked = true;
  document.querySelectorAll(".bopt").forEach(b => b.disabled = true);

  const r = await api("/api/past_papers/evaluate","POST",{
    question_id: ppState.currentQ.id,
    answer: answer,
  });
  if (!r) { ppState.locked = false; return; }

  ppState.total++;
  if (r.correct) ppState.score++;

  // Highlight buttons
  document.querySelectorAll(".bopt").forEach(btn => {
    const t = btn.textContent.trim();
    if (t === answer.trim())              btn.classList.add(r.correct ? 'correct' : 'wrong');
    if (t === r.correct_answer && !r.correct) btn.classList.add('correct');
  });

  const resultEl = document.getElementById("pp-result");
  if (resultEl) {
    resultEl.innerHTML = `
      <div class="pp-result-box ${r.correct?'correct':'wrong'}">
        ${r.correct ? '✅ Correct!' : `❌ Wrong — correct answer: <b>${escHtml(r.correct_answer)}</b>`}
        ${r.explanation ? `<div style="margin-top:6px;opacity:0.8;font-size:12px">${escHtml(r.explanation)}</div>` : ''}
      </div>
      <button class="abtn" data-t="info" onclick="ppNextQuestion()" style="margin-top:8px">Next Question →</button>
    `;
  }
}

async function showPPModelAnswer() {
  if (ppState.locked) return;
  ppState.locked = true;
  const ta = document.getElementById("ppOpenAns");
  if (ta) ta.disabled = true;

  const r = await api("/peek_answer","POST",{question_id: ppState.currentQ.id});
  const modelAns = r?.correct_answer || "(no answer available)";

  const resultEl = document.getElementById("pp-result");
  if (resultEl) {
    resultEl.innerHTML = `
      <div class="self-eval-panel" style="margin-top:10px">
        <div class="sep-title">📖 Model Answer</div>
        <div class="sep-body">${escHtml(modelAns)}</div>
        ${r?.explanation ? `<div class="sep-expl">${escHtml(r.explanation)}</div>` : ''}
        <div class="sep-question">Did your answer cover the key ideas?</div>
        <div style="display:flex;gap:8px;margin-top:8px">
          <button class="bopt correct" style="flex:1" onclick="submitPPSelfEval(true)">✅ I got it</button>
          <button class="bopt wrong"  style="flex:1" onclick="submitPPSelfEval(false)">❌ I missed it</button>
        </div>
      </div>
    `;
  }
  ppState.locked = false;
}

async function submitPPSelfEval(correct) {
  if (ppState.locked) return;
  ppState.locked = true;
  ppState.total++;
  if (correct) ppState.score++;

  const resultEl = document.getElementById("pp-result");
  const panel = resultEl?.querySelector(".self-eval-panel");
  if (panel) {
    panel.innerHTML += `<div style="margin-top:10px;color:${correct?'#8d8':'#d88'};font-size:13px">${correct?'✅ Marked correct':'❌ Marked wrong'}</div>`;
  }
  document.querySelectorAll(".bopt").forEach(b => b.disabled = true);
  if (resultEl) {
    resultEl.insertAdjacentHTML("beforeend",`
      <button class="abtn" data-t="info" onclick="ppNextQuestion()" style="margin-top:12px">Next Question →</button>
    `);
  }
}

async function ppNextQuestion() {
  ppState.locked = false;
  await loadNextPPQuestion();
}

function confirmQuitPP() {
  const ok = confirm("Quit this revision session? Your score will be lost.");
  if (ok) {
    ppState.active = false;
    renderPastPapers();
  }
}

function renderPPEnd() {
  const pct = ppState.total > 0 ? Math.round((ppState.score/ppState.total)*100) : 0;
  let grade = '💀', gradeLabel = 'Needs Work', gradeSub = 'The archive has not been kind. Study harder.';
  if (pct >= 90) { grade='🏆'; gradeLabel='Mastery'; gradeSub='The Pale Drift bows before your knowledge.'; }
  else if (pct >= 75) { grade='⭐'; gradeLabel='Proficient'; gradeSub='Strong foundation. A few gaps remain.'; }
  else if (pct >= 60) { grade='📖'; gradeLabel='Developing'; gradeSub='You know more than you think. Keep drilling.'; }
  else if (pct >= 40) { grade='⚠️'; gradeLabel='Struggling'; gradeSub='Return to the Library. Re-read the notes.'; }

  render(`
    <div class="header"><h1>C.R.A.M — The Unbound</h1></div>
    <div class="pp-end-screen">
      <div class="pp-grade">${grade}</div>
      <div class="pp-grade-label">${gradeLabel}</div>
      <div class="pp-grade-sub">${gradeSub}</div>
      <div style="font-size:28px;color:#c8a2ff;margin-bottom:6px">${ppState.score} / ${ppState.total}</div>
      <div style="font-size:14px;color:#555;margin-bottom:28px">${pct}% accuracy</div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <button class="pp-start-btn" style="max-width:200px" onclick="ppState.active=false; startPPQuiz()">🔁 Try Again</button>
        <button class="abtn" data-t="navigation" style="max-width:200px" onclick="ppState.active=false; renderPastPapers()">← Back to Menu</button>
      </div>
    </div>
  `);
}


// ── Utils ──────────────────────────────────────────────────────────────────
function escHtml(s) {
  if (!s) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function escAttr(s) {
  if (!s) return "";
  return String(s).replace(/'/g,"\\'").replace(/"/g,'\\"');
}

  { speaker: 'cpt', line: "Don't mind him. I'm Cpt Shanyok — I keep the real knowledge. The Rift tests what you know. Come in weak, you come out broken." },
  { speaker: 'rich', line: "Mara you come in prepared? Jrrr bra, you leave RICH. Knowledge. Power. Maybe some chains like mine. Let's go." },
];

let _introBanterIdx = 0;

function renderIntroScreen() {
  _introBanterIdx = 0;
  const banter = INTRO_BANTER[0];
  const _richFact = GETRICH_FACTS[Math.floor(Math.random() * GETRICH_FACTS.length)];
  render(`
    <div class="intro-splash" id="introSplash">
      <div class="intro-title">
        <div class="intro-cram">C.R.A.M</div>
        <div class="intro-subtitle">The Unbound</div>
      </div>
      <div class="intro-chars">
        <div class="intro-char intro-shanty char-active" id="introShanty">
          ${getCptShantySpriteHTML()}
          <div class="intro-char-name">Cpt. Shanyok</div>
        </div>
        <div class="intro-char intro-getrich" id="introGetRich">
          <div class="getrich-fact-bubble"><span class="getrich-fact-icon">${_richFact.icon}</span>${_richFact.text}</div>
          ${getSirGetRICHSprite()}
          <div class="intro-char-name">Sir GetRICH</div>
        </div>
      </div>
      <div class="intro-dialogue" id="introDialogue">
        <div class="intro-speaker ${banter.speaker === 'rich' ? 'spk-rich' : 'spk-cpt'}" id="introSpeaker">
          ${banter.speaker === 'rich' ? 'Sir GetRICH 💰' : 'Cpt. Shanyok ⚓'}
        </div>
        <div class="intro-line" id="introLine">${banter.line}</div>
        <button class="intro-next-btn" id="introProceedBtn" onclick="advanceIntroBanter()">
          Continue →
        </button>
      </div>
      <div class="intro-skip" onclick="renderStart()">Skip intro</div>
    </div>
  `);
}

function advanceIntroBanter() {
  _introBanterIdx++;
  if (_introBanterIdx >= INTRO_BANTER.length) {
    renderStart();
    return;
  }
  const banter = INTRO_BANTER[_introBanterIdx];
  const spkEl  = document.getElementById('introSpeaker');
  const lineEl = document.getElementById('introLine');
  const btn    = document.getElementById('introProceedBtn');
  const shantyEl   = document.getElementById('introShanty');
  const getrichEl  = document.getElementById('introGetRich');

  if (spkEl) spkEl.className = `intro-speaker ${banter.speaker === 'rich' ? 'spk-rich' : 'spk-cpt'}`;
  if (spkEl) spkEl.textContent = banter.speaker === 'rich' ? 'Sir GetRICH 💰' : 'Cpt. Shanyok ⚓';
  if (lineEl) lineEl.textContent = banter.line;

  // Highlight active speaker
  if (shantyEl)  shantyEl.classList.toggle('char-active', banter.speaker === 'cpt');
  if (getrichEl) getrichEl.classList.toggle('char-active', banter.speaker === 'rich');

  const isLast = _introBanterIdx >= INTRO_BANTER.length - 1;
  if (btn) btn.textContent = isLast ? "Enter the Rift →" : "Continue →";
}

// ── Init ───────────────────────────────────────────────────────────────────
renderIntroScreen();
</script>
</body>
</html>
