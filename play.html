<!doctype html>
<html>
<head>
  <title>Origins: The Unbound</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0f; color: #d4d4d4; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
    #app { max-width: 960px; margin: 0 auto; padding: 20px; }

    /* ── Header ─────────────────────────────────────────────────────── */
    .header { text-align:center; padding:18px 0 8px; border-bottom:1px solid #1a1a2e; margin-bottom:16px; }
    .header h1 { color:#c8a2ff; font-size:26px; letter-spacing:2px; }
    .header .sub { color:#555; font-size:11px; margin-top:3px; }

    /* ── Player bar ─────────────────────────────────────────────────── */
    .pbar { display:flex; gap:18px; justify-content:center; align-items:center;
            padding:10px 16px; background:#0e0e1a; border-radius:8px; margin-bottom:16px; font-size:13px; }
    .pbar .s { color:#777; }
    .pbar .s b { color:#eee; }
    .pbar .hp-bar { width:120px; height:8px; background:#2a0a0a; border-radius:4px; overflow:hidden; display:inline-block; margin-left:6px; vertical-align:middle; }
    .pbar .hp-fill { height:100%; background:#c0392b; border-radius:4px; transition:width 0.4s; }
    .pbar .xp-bar { width:80px; height:8px; background:#1a1a0a; border-radius:4px; overflow:hidden; display:inline-block; margin-left:6px; vertical-align:middle; }
    .pbar .xp-fill { height:100%; background:#f1c40f; border-radius:4px; transition:width 0.4s; }

    /* ── World Map (spatial) ────────────────────────────────────────── */
    .map-scroll-outer {
      margin:10px 0 12px; border:1px solid #12121e; border-radius:12px;
      overflow:hidden; background:#040812;
    }
    .map-scroll-bg {
      background:
        radial-gradient(ellipse 70% 55% at 15% 50%, rgba(90,50,180,0.07) 0%, transparent 65%),
        radial-gradient(ellipse 50% 70% at 85% 25%, rgba(180,80,40,0.05) 0%, transparent 65%),
        repeating-linear-gradient(90deg, transparent 0, transparent 109px, rgba(255,255,255,0.012) 110px),
        repeating-linear-gradient(0deg,  transparent 0, transparent 59px,  rgba(255,255,255,0.012) 60px),
        #040812;
      overflow-x:auto; overflow-y:hidden;
      padding:8px; cursor:grab; scroll-behavior:smooth; -webkit-overflow-scrolling:touch;
    }
    .map-scroll-bg:active { cursor:grabbing; }
    .map-canvas { position:relative; }
    .map-svg { overflow:visible; pointer-events:none; position:absolute; top:0; left:0; }
    /* Node circles */
    .map-node {
      position:absolute; border-radius:50%;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      transition:transform 0.15s; user-select:none; cursor:default;
      background:#070b14; border:2px solid; overflow:visible;
    }
    .map-node .mn-icon { font-size:14px; line-height:1; pointer-events:none; }
    .map-node .mn-label {
      position:absolute; top:calc(100% + 4px); left:50%; transform:translateX(-50%);
      font-size:9px; color:#555; white-space:nowrap; pointer-events:none; text-align:center;
    }
    .mn-current  { cursor:pointer!important; animation:pulse-cur 2s infinite; }
    .mn-reachable{ cursor:pointer!important; animation:breathe-reach 1.8s infinite; }
    .mn-reachable:hover { transform:scale(1.28)!important; }
    .mn-fog      { opacity:0.15!important; pointer-events:none; }
    .mn-cleared  { opacity:0.4; }
    .mn-visited  { opacity:0.75; }
    @keyframes pulse-cur    { 0%,100%{box-shadow:0 0 8px var(--nc,#888)}  50%{box-shadow:0 0 22px var(--nc,#888),0 0 44px var(--nc,#888)} }
    @keyframes breathe-reach{ 0%,100%{box-shadow:0 0 4px var(--nc,#888)}  50%{box-shadow:0 0 14px var(--nc,#888)} }
    /* Location card under map */
    .map-loc-card {
      display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px;
      background:#070710; border:1px solid #10101c; border-radius:8px;
      padding:9px 14px; margin-bottom:10px; font-size:12px;
    }
    .mlc-left { display:flex; align-items:center; gap:8px; }
    .mlc-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .mlc-name { color:#ccc; font-weight:bold; }
    .mlc-meta { color:#3a3a4a; font-size:11px; margin-left:4px; }
    .mlc-legend { display:flex; gap:10px; flex-wrap:wrap; color:#383848; }
    .mlc-legend span { display:flex; align-items:center; gap:4px; }

    /* ── Node panel ─────────────────────────────────────────────────── */
    .npanel { background:#0e0e1c; border:1px solid #1a1a30; border-radius:10px; padding:18px; margin-bottom:14px; }
    .npanel h2 { color:#c8a2ff; font-size:17px; margin-bottom:3px; }
    .nmeta { color:#555; font-size:12px; margin-bottom:14px; }
    .nmeta span { margin-right:12px; }

    .abtn {
      display:block; width:100%; text-align:left; padding:11px 15px; margin-bottom:7px;
      background:#12121e; border:1px solid #1e1e30; border-radius:7px;
      color:#bbb; font-size:13px; cursor:pointer; transition:all 0.12s;
    }
    .abtn:hover { background:#18182a; border-color:#3a3a66; color:#eee; }
    .abtn[data-t="combat"]    { border-left:3px solid #ff4444; }
    .abtn[data-t="challenge"] { border-left:3px solid #aa44ff; }
    .abtn[data-t="utility"]   { border-left:3px solid #44cc77; }
    .abtn[data-t="info"]      { border-left:3px solid #44aaff; }
    .abtn[data-t="event"]     { border-left:3px solid #ffaa44; }
    .abtn[data-t="navigation"]{ border-left:3px solid #444; color:#777; }

    /* ── Combat ─────────────────────────────────────────────────────── */
    .cpanel { background:#0f0808; border:1px solid #2a1010; border-radius:10px; padding:18px; margin-bottom:14px; }
    .cpanel h2 { color:#ff7070; font-size:18px; margin-bottom:12px; }

    .hpbars { display:grid; grid-template-columns:1fr 40px 1fr; gap:10px; align-items:center; margin-bottom:16px; }
    .combatant { }
    .combatant .name { font-size:13px; color:#aaa; margin-bottom:5px; }
    .combatant .hprow { display:flex; align-items:center; gap:8px; }
    .combatant .bar { flex:1; height:12px; background:#1a0a0a; border-radius:6px; overflow:hidden; }
    .combatant .fill { height:100%; border-radius:6px; transition:width 0.5s ease; }
    .combatant.player .fill { background:linear-gradient(90deg,#e74c3c,#ff6b6b); }
    .combatant.enemy .fill  { background:linear-gradient(90deg,#8e44ad,#c0392b); }
    .combatant .hpnum { font-size:12px; color:#888; white-space:nowrap; }
    .vs { text-align:center; font-size:20px; color:#444; }

    .streak-bar { text-align:center; margin-bottom:12px; font-size:13px; color:#f1c40f; height:20px; }

    .qbox { background:#0a0a14; border:1px solid #1a1a28; border-radius:8px; padding:14px; }
    .qtext { color:#ddd; font-size:14px; margin-bottom:12px; line-height:1.5; }
    .opt {
      display:block; width:100%; text-align:left; padding:10px 14px; margin-bottom:6px;
      background:#111120; border:1px solid #22223a; border-radius:6px;
      color:#ccc; font-size:13px; cursor:pointer; transition:all 0.12s;
    }
    .opt:hover:not(:disabled) { background:#1a1a30; border-color:#44449a; color:#fff; }
    .opt:disabled { cursor:default; opacity:0.7; }
    .opt.correct  { background:#0a2a0a!important; border-color:#2a7a2a!important; color:#8f8!important; }
    .opt.wrong    { background:#2a0a0a!important; border-color:#7a2a2a!important; color:#f88!important; }

    .expl { margin-top:10px; padding:10px; border-radius:6px; font-size:13px; line-height:1.5; }
    .expl.good { background:#0a1f0a; border:1px solid #1a4a1a; color:#8d8; }
    .expl.bad  { background:#1f0a0a; border:1px solid #4a1a1a; color:#d88; }

    /* ── Damage flash ───────────────────────────────────────────────── */
    @keyframes pop { 0%{transform:translateY(0);opacity:1} 100%{transform:translateY(-30px);opacity:0} }
    .dmg-pop { position:fixed; font-size:22px; font-weight:bold; pointer-events:none; animation:pop 1.2s ease forwards; z-index:999; }
    .dmg-pop.good { color:#ff5555; }
    .dmg-pop.bad  { color:#cc44ff; }
    .dmg-pop.heal { color:#55ff88; }

    /* ── Result boxes ───────────────────────────────────────────────── */
    .rbox { padding:12px; border-radius:8px; margin:10px 0; font-size:13px; line-height:1.5; }
    .rbox.good { background:#0a1e0a; border:1px solid #1a3e1a; color:#7d7; }
    .rbox.bad  { background:#1e0a0a; border:1px solid #3e1a1a; color:#d77; }
    .rbox.info { background:#0a0a1e; border:1px solid #1a1a3e; color:#77d; }

    /* ── Log ────────────────────────────────────────────────────────── */
    .log { background:#060609; border:1px solid #111; border-radius:7px; padding:8px 12px;
           max-height:120px; overflow-y:auto; font-size:11px; font-family:monospace; color:#444; margin-top:12px; }
    .log div { padding:1px 0; }

    /* ── Start ──────────────────────────────────────────────────────── */
    .start { text-align:center; padding:80px 20px; }
    .start h1 { color:#c8a2ff; font-size:34px; margin-bottom:8px; letter-spacing:2px; }
    .start p { color:#555; margin-bottom:30px; font-size:14px; }
    .start-btn {
      padding:14px 44px; background:#1a0f2e; border:1px solid #4a2a8a;
      color:#c8a2ff; font-size:16px; border-radius:8px; cursor:pointer;
      letter-spacing:1px; transition:all 0.2s;
    }
    .start-btn:hover { background:#250f3e; border-color:#7a4abb; }

    /* ── Legend ─────────────────────────────────────────────────────── */
    .legend { display:flex; gap:14px; justify-content:center; margin-bottom:10px; font-size:11px; color:#444; flex-wrap:wrap; }
    .legend span { display:flex; align-items:center; gap:4px; }
    .dot { width:8px; height:8px; border-radius:2px; flex-shrink:0; }

    /* ── Combat result banner ───────────────────────────────────────── */
    .result-banner { text-align:center; padding:30px; }
    .result-banner h2 { font-size:28px; margin-bottom:10px; }
    .result-banner p { color:#888; font-size:14px; margin-bottom:20px; }

    /* ── Insight button ──────────────────────────────────────────── */
    .insight-btn { padding:8px 16px; background:#0a1525; border:1px solid #1a3a5a; color:#6bcfff; font-size:13px; border-radius:6px; cursor:pointer; transition:all 0.15s; margin-top:8px; }
    .insight-btn:hover:not(:disabled) { background:#0f2035; border-color:#4a8abf; }
    .insight-btn:disabled { opacity:0.4; cursor:default; }
    .insight-hint { background:#050f1a; border:1px solid #1a3a5a; border-radius:6px; padding:10px 14px; margin-top:8px; color:#88ccff; font-size:13px; line-height:1.5; }
    /* ── Equipment picker ─────────────────────────────────────────── */
    .equip-panel { background:#0c0c1a; border:1px solid #1a1a30; border-radius:10px; padding:18px; margin-bottom:14px; }
    .equip-panel h2 { color:#c8a2ff; margin-bottom:14px; font-size:17px; }
    .equip-section { margin-bottom:16px; }
    .equip-section h3 { color:#888; font-size:12px; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }
    .equip-card { display:inline-block; padding:10px 14px; margin:4px; border-radius:7px; border:1px solid #1e1e30; background:#12121e; cursor:pointer; font-size:13px; color:#bbb; transition:all 0.12s; vertical-align:top; min-width:130px; }
    .equip-card:hover { background:#181828; border-color:#4a4a8a; color:#eee; }
    .equip-card.selected { border-color:#c8a2ff; color:#c8a2ff; background:#160f2a; }
    .equip-card .eq-name { font-weight:bold; margin-bottom:3px; }
    .equip-card .eq-stat { font-size:11px; color:#666; }
    .equip-card.selected .eq-stat { color:#9a7adf; }
    /* ── Codex viewer ──────────────────────────────────────────────── */
    .codex-panel { background:#0a0c0a; border:1px solid #1a2a1a; border-radius:10px; padding:18px; margin-bottom:14px; }
    .codex-panel h2 { color:#88cc88; margin-bottom:6px; font-size:17px; }
    .codex-sub { color:#445; font-size:12px; margin-bottom:14px; }
    .codex-table { width:100%; border-collapse:collapse; font-size:12px; }
    .codex-table th { background:#0f1f0f; color:#88cc88; padding:7px 10px; text-align:left; border-bottom:1px solid #2a3a2a; }
    .codex-table td { padding:7px 10px; border-bottom:1px solid #111a11; color:#aaa; vertical-align:top; max-width:200px; word-break:break-word; }
    .codex-table tr:hover td { background:#0c150c; }
    .codex-ok { color:#5a5; }
    .codex-bad { color:#a55; }
    .codex-empty { color:#445; font-size:13px; text-align:center; padding:30px; }
    /* ── Level up ───────────────────────────────────────────────────── */
    @keyframes levelup { 0%{opacity:0;transform:scale(0.8)} 50%{opacity:1;transform:scale(1.05)} 100%{opacity:0;transform:scale(1)} }
    .levelup-flash { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
                     font-size:36px; color:#f1c40f; font-weight:bold; text-shadow:0 0 20px #f1c40f;
                     pointer-events:none; animation:levelup 2.5s ease forwards; z-index:1000; }
  </style>
</head>
<body>
<div id="app"></div>

<script>
const API = "http://localhost:8000";

// ── State ──────────────────────────────────────────────────────────────────
let gameId    = null;   // game session id
let world     = null;
let curNode   = null;
let player    = { level:1, xp:0, hp:100, max_hp:100, insight:0 };

// combat state (separate from game session)
let combatId  = null;   // combat session id (UUID from /start_combat)
let combatHp  = { player: 100, playerMax: 100, enemy: 60, enemyMax: 60 };
let combatEnemy = { name:"Enemy" };
let combatRound = 1;
let combatStreak = 0;
let combatLocked = false;  // prevent double-clicks while animating

let logs = [];

// ── Helpers ────────────────────────────────────────────────────────────────
function log(msg) {
  logs.push(msg);
  if (logs.length > 60) logs.shift();
}
function renderLog() {
  return `<div class="log">${logs.slice(-20).map(l=>`<div>> ${l}</div>`).join('')}</div>`;
}
function render(html) { document.getElementById("app").innerHTML = html; }

async function api(path, method="GET", body=null) {
  const opts = { method, headers:{"Content-Type":"application/json"} };
  if (body) opts.body = JSON.stringify(body);
  try {
    const res = await fetch(API + path, opts);
    if (!res.ok) {
      const e = await res.json().catch(()=>({detail:res.statusText}));
      log("❌ " + (e.detail||res.statusText));
      return null;
    }
    return res.json();
  } catch(e) {
    log("❌ Connection error: " + e.message);
    return null;
  }
}

function pct(v, max) { return Math.max(0, Math.min(100, Math.round((v/max)*100))); }

function playerBar() {
  const hp = player.hp, mhp = player.max_hp;
  const xpInLevel = player.xp % 50, xpNeeded = 50;
  return `<div class="pbar">
    <span class="s">Lv <b>${player.level}</b></span>
    <span class="s">
      XP <b>${player.xp}</b>
      <span class="xp-bar"><span class="xp-fill" style="width:${pct(xpInLevel,xpNeeded)}%"></span></span>
    </span>
    <span class="s">
      HP <b>${hp}/${mhp}</b>
      <span class="hp-bar"><span class="hp-fill" style="width:${pct(hp,mhp)}%"></span></span>
    </span>
    <span class="s">💡 <b>${player.insight||0}</b></span>
  </div>`;
}

function dmgPop(text, type, el) {
  const pop = document.createElement("div");
  pop.className = `dmg-pop ${type}`;
  pop.textContent = text;
  const r = el ? el.getBoundingClientRect() : {left:window.innerWidth/2, top:window.innerHeight/2};
  pop.style.left = (r.left + r.width/2) + "px";
  pop.style.top  = (r.top) + "px";
  document.body.appendChild(pop);
  setTimeout(() => pop.remove(), 1300);
}

// ── Start Screen ───────────────────────────────────────────────────────────
function renderStart() {
  render(`<div class="start">
    <h1>C.R.A.M — The Unbound</h1>
    <p>Enter the Unread World. Answer to survive.</p>
    <button class="start-btn" onclick="startGame()">Begin Your Run</button>
    <br><br>
    <button class="start-btn" onclick="renderCodex()" style="font-size:13px;padding:10px 24px;background:#0a1a0a;border-color:#2a4a2a;color:#88cc88">📕 Open Codex</button>
  </div>`);
}

async function startGame() {
  render(`<div class="start"><p style="color:#555">Generating world...</p></div>`);
  const data = await api("/api/game/start","POST");
  if (!data) { renderStart(); return; }
  gameId  = data.session_id;
  world   = data.world;
  curNode = data.current_node;
  log("Run started — session: " + gameId);
  await syncPlayer();
  renderOverworld();
}

async function syncPlayer() {
  const d = await api(`/api/game/world/${gameId}`);
  if (!d) return;
  player  = { level:d.level, xp:d.xp, hp:d.hp, max_hp:d.max_hp, insight:d.insight||0,
              weapon_id: d.weapon_id||"none", armor_id: d.armor_id||"none" };
  world   = d.world;
  curNode = d.current_node;
}

// ── Overworld ──────────────────────────────────────────────────────────────
function renderOverworld() {
  const conns = world[curNode]?.connections || [];

  // Build depth groups
  const depths = {};
  for (const [id, n] of Object.entries(world)) {
    const d = n.depth;
    if (!depths[d]) depths[d] = [];
    depths[d].push({id,...n});
  }
  const sortedD = Object.keys(depths).map(Number).sort((a,b)=>a-b);

  // Layout constants
  const COL_W   = 112;
  const PAD_X   = 60;
  const PAD_TOP = 24;
  const PAD_BOT = 44;
  const MAP_H   = 320;
  const AREA_H  = MAP_H - PAD_TOP - PAD_BOT;
  const NODE_R  = 22;

  // Assign x,y positions per node
  const positions = {};
  for (const d of sortedD) {
    const nodes = depths[d];
    const count = nodes.length;
    nodes.forEach((node, i) => {
      const x = PAD_X + d * COL_W;
      const y = PAD_TOP + (count === 1 ? AREA_H / 2 : (i / (count - 1)) * AREA_H);
      positions[node.id] = {x, y};
    });
  }

  const mapW = PAD_X * 2 + (sortedD.length - 1) * COL_W;
  const mapH = MAP_H;

  // Node visuals
  const TYPE_ICON  = {combat:'⚔', challenge:'📖', utility:'⛺', event:'✦', hub:'🏰'};
  const TYPE_COLOR = {combat:'#bb3333', challenge:'#7733bb', utility:'#228844', event:'#bb7722', hub:'#c8a2ff'};

  // Build SVG connection paths
  const drawnLines = new Set();
  const linePaths = [];
  for (const [id, n] of Object.entries(world)) {
    for (const connId of (n.connections || [])) {
      const key = [id, connId].sort().join('|');
      if (drawnLines.has(key) || !positions[id] || !positions[connId]) continue;
      drawnLines.add(key);
      const a = positions[id], b = positions[connId];
      const isTravel = (id===curNode && conns.includes(connId)) || (connId===curNode && conns.includes(id));
      const bothCleared = world[id]?.state==='cleared' && world[connId]?.state==='cleared';
      // Quadratic bezier for visual curves
      const mx = (a.x + b.x) / 2;
      const my = (a.y + b.y) / 2 - Math.abs(b.x - a.x) * 0.06;
      const pathD = `M${a.x},${a.y} Q${mx},${my} ${b.x},${b.y}`;
      if (isTravel) {
        // Double line for travelable paths — glow + solid
        linePaths.push(`<path d="${pathD}" fill="none" stroke="#1a3a6a" stroke-width="6" stroke-opacity="0.4" stroke-linecap="round"/>`);
        linePaths.push(`<path d="${pathD}" fill="none" stroke="#4a8acc" stroke-width="2" stroke-opacity="0.9" stroke-linecap="round"/>`);
      } else if (bothCleared) {
        linePaths.push(`<path d="${pathD}" fill="none" stroke="#1a2a1a" stroke-width="1.5" stroke-opacity="0.5" stroke-linecap="round"/>`);
      } else {
        linePaths.push(`<path d="${pathD}" fill="none" stroke="#1c2438" stroke-width="1.5" stroke-opacity="0.6" stroke-dasharray="3,4" stroke-linecap="round"/>`);
      }
    }
  }

  // Build depth column labels (biome label at bottom of each column)
  const colLabels = sortedD.map(d => {
    const firstNode = depths[d]?.[0];
    const px = positions[firstNode?.id];
    if (!px) return '';
    const lbl = d===0 ? 'ORIGIN' : `DEPTH ${d}`;
    return `<div style="position:absolute;bottom:6px;left:${px.x}px;transform:translateX(-50%);font-size:8px;color:#1e1e2e;letter-spacing:1px;white-space:nowrap;user-select:none">${lbl}</div>`;
  }).join('');

  // Build node circle elements
  const nodeEls = Object.entries(world).map(([id, n]) => {
    const pos = positions[id];
    if (!pos) return '';
    const isCurrent   = id === curNode;
    const isReachable = !isCurrent && conns.includes(id);
    const isCleared   = n.state === 'cleared';
    const isVisited   = n.state === 'visited';
    const isFog       = n.state === 'unvisited' && !isCurrent && !isReachable;

    const icon  = TYPE_ICON[n.type]  || '?';
    const color = TYPE_COLOR[n.type] || '#555';
    const label = id==='citadel' ? 'Citadel' : (n.subtype || n.type);
    const displayLabel = isFog ? '???' : label;

    let cls = 'map-node';
    if (isCurrent)    cls += ' mn-current';
    else if (isReachable) cls += ' mn-reachable';
    else if (isCleared)   cls += ' mn-cleared';
    else if (isVisited)   cls += ' mn-visited';
    else                  cls += ' mn-fog';

    const onClick    = (isCurrent || isReachable) ? `onclick="moveTo('${id}')"` : '';
    const borderCol  = isFog ? '#131320' : color;
    const bgCol      = isCurrent ? '#110820' : isCleared ? '#060608' : '#070b14';
    const borderW    = isCurrent ? '2.5px' : '2px';
    const size       = NODE_R * 2;

    return `<div class="${cls}"
      style="left:${pos.x-NODE_R}px;top:${pos.y-NODE_R}px;width:${size}px;height:${size}px;
             border-color:${borderCol};border-width:${borderW};background:${bgCol};--nc:${color}"
      ${onClick} title="${id} · ${n.type}/${n.subtype} · depth ${n.depth}">
      <div class="mn-icon">${isFog ? '?' : icon}</div>
      <div class="mn-label">${displayLabel}</div>
    </div>`;
  }).join('');

  // Current node summary card
  const cur     = world[curNode] || {};
  const curColor = TYPE_COLOR[cur.type] || '#888';
  const curIcon  = TYPE_ICON[cur.type]  || '?';
  const locName  = curNode==='citadel' ? '🏰 The Citadel' : `${curIcon} ${cur.subtype||cur.type}`;

  render(`
    <div class="header"><h1>C.R.A.M — The Unbound</h1><div class="sub">The Unread World</div></div>
    ${playerBar()}

    <div class="map-scroll-outer">
      <div class="map-scroll-bg" id="mapScroll">
        <div class="map-canvas" style="width:${mapW}px;height:${mapH}px">
          <svg class="map-svg" width="${mapW}" height="${mapH}">
            ${linePaths.join('')}
          </svg>
          ${nodeEls}
          ${colLabels}
        </div>
      </div>
    </div>

    <div class="map-loc-card">
      <div class="mlc-left">
        <div class="mlc-dot" style="background:${curColor}"></div>
        <span class="mlc-name">${locName}</span>
        <span class="mlc-meta">· ${cur.biome||'unknown'} · depth ${cur.depth??0} · ${conns.length} path${conns.length!==1?'s':''} forward</span>
      </div>
      <div class="mlc-legend">
        <span><span class="dot" style="background:#bb3333"></span>Combat</span>
        <span><span class="dot" style="background:#7733bb"></span>Challenge</span>
        <span><span class="dot" style="background:#228844"></span>Utility</span>
        <span><span class="dot" style="background:#bb7722"></span>Event</span>
        <span><span class="dot" style="background:#c8a2ff"></span>Hub</span>
      </div>
    </div>

    <button class="abtn" data-t="info" onclick="enterNode()" style="max-width:240px">🚪 Enter Current Node</button>
    ${renderLog()}
  `);

  // Auto-scroll map to keep current node visible
  setTimeout(() => {
    const scroll = document.getElementById('mapScroll');
    const pos = positions[curNode];
    if (scroll && pos) {
      scroll.scrollLeft = Math.max(0, pos.x - scroll.clientWidth / 2);
    }
  }, 40);
}

async function moveTo(nodeId) {
  if (nodeId === curNode) { enterNode(); return; }
  const r = await api("/api/game/move","POST",{session_id:gameId, target_node_id:nodeId});
  if (!r) return;
  curNode = r.current_node;
  if (r.node) world[curNode] = r.node;
  log(`Moved → ${curNode}`);
  renderOverworld();
}

// ── Node Screen ────────────────────────────────────────────────────────────
async function enterNode() {
  const r = await api(`/api/game/node/${gameId}`);
  if (!r) return;
  const node = r.node, actions = r.actions;
  log(`Entered ${node.id} (${node.type}/${node.subtype})`);

  const diffStars = "⭐".repeat(Math.min(node.difficulty||1,5));
  render(`
    <div class="header"><h1>C.R.A.M — The Unbound</h1></div>
    ${playerBar()}
    <div class="npanel">
      <h2>${node.id==="citadel"?"🏰 The Citadel":"📍 "+node.id}</h2>
      <div class="nmeta">
        <span>Type: ${node.type}</span>
        <span>Subtype: ${node.subtype}</span>
        <span>Biome: ${node.biome}</span>
        <span>Difficulty: ${diffStars}</span>
        ${node.god?`<span>God: ${node.god}</span>`:""}
      </div>
      ${actions.map(a=>`<button class="abtn" data-t="${a.type}" onclick="doAction('${a.id}')">${a.label}</button>`).join("")}
    </div>
    ${renderLog()}
  `);
}

async function doAction(actionId) {
  if (actionId==="leave") { renderOverworld(); return; }

  const r = await api("/api/game/node/action","POST",{session_id:gameId,action_id:actionId});
  if (!r) return;
  log(`${actionId} → ${r.type}`);

  if (r.type==="combat_started") {
    await beginCombat(r);
    return;
  }
  if (r.type==="heal") {
    await syncPlayer();
    injectResult("good","❤️ " + (r.message||"Healed!"));
    return;
  }
  if (r.type==="reward") {
    const xpR = await api("/api/game/xp","POST",{session_id:gameId,amount:r.xp||10});
    if (xpR?.level_up) showLevelUp(xpR.level);
    await syncPlayer();
    injectResult("good","🎁 " + (r.message||"Found a reward!"));
    return;
  }
  if (r.type==="bonus") {
    await syncPlayer();
    injectResult("info","💡 " + (r.message||"Gained insight."));
    return;
  }
  if (r.type==="anomaly_started") {
    injectResult("info","🌀 " + (r.message||"Anomaly started."));
    return;
  }
  if (r.type==="codex_view") { renderCodex(); return; }
  if (r.type==="equipment_menu") { renderEquipment(); return; }
  if (r.type==="map_view") { renderOverworld(); return; }
  if (r.type==="flee") { injectResult("info","🏃 " + (r.message||"You fled!")); setTimeout(()=>renderOverworld(),1200); return; }
  if (r.type==="save_prompt") { injectResult("good","💾 " + (r.message||"Saved.")); return; }
  if (r.type==="shop_menu") { injectResult("info","🛒 " + (r.message||"Shop coming soon.")); return; }
  if (r.message) { injectResult("info", r.message); return; }
  renderOverworld();
}

function injectResult(type, msg) {
  const panel = document.querySelector(".npanel");
  if (!panel) return;
  const old = panel.querySelector(".rbox");
  if (old) old.remove();
  panel.insertAdjacentHTML("beforeend",`<div class="rbox ${type}">${msg}</div>`);
}

// ── Combat ─────────────────────────────────────────────────────────────────
let combatInsightUses = 2;

async function beginCombat(info) {
  combatLocked = false;
  const r = await api("/start_combat","POST",{
    concept_id: info.concept_id||null,
    weapon_id:  player.weapon_id || info.weapon_id || "none",
    armor_id:   player.armor_id  || info.armor_id  || "none",
    node_god:   info.god||null,
    node_modifiers: [],
    bonus_insight: player.insight||0,
  });
  if (!r) { renderOverworld(); return; }

  combatId      = r.session_id;
  combatRound   = r.round||1;
  combatStreak  = r.streak||0;
  combatInsightUses = r.insight_uses ?? 2;
  combatEnemy   = { name: r.enemy_name||"Enemy", concept: r.enemy_concept||"" };
  combatHp = {
    player: r.player_hp, playerMax: r.player_max_hp,
    enemy:  r.enemy_hp,  enemyMax:  r.enemy_max_hp,
  };
  log(`⚔️ Combat! vs ${combatEnemy.name} | Weapon: ${r.weapon?.name||"none"} | Armor: ${r.armor?.name||"none"}`);
  renderCombat(r.question);
}

function renderCombat(q) {
  if (!q) { endCombat(false); return; }

  render(`
    <div class="header"><h1>C.R.A.M — The Unbound</h1><div class="sub">Combat</div></div>
    <div class="cpanel">
      <h2>⚔️ ${combatEnemy.name}</h2>
      ${hpBarsHtml()}
      <div class="streak-bar" id="sbar">${streakHtml()}</div>
      <div class="qbox">
        <div class="qtext">${escHtml(q.question)}</div>
        ${(q.options||[]).map((opt,i)=>`
          <button class="opt" id="opt${i}" onclick="submitAnswer('${escAttr(q.id)}','${escAttr(opt)}')">${escHtml(opt)}</button>
        `).join("")}
        <button class="insight-btn" id="insightBtn" ${combatInsightUses<=0?"disabled":""} onclick="useInsight()">
          💡 Use Insight (${combatInsightUses} left)
        </button>
        <div id="insightHint"></div>
        <div id="expl"></div>
      </div>
    </div>
    <div style="font-size:12px;color:#444;margin-top:8px;text-align:center">Round ${combatRound}</div>
    ${renderLog()}
  `);
}

function hpBarsHtml() {
  const pp = pct(combatHp.player, combatHp.playerMax);
  const ep = pct(combatHp.enemy, combatHp.enemyMax);
  return `
  <div class="hpbars">
    <div class="combatant player">
      <div class="name">You</div>
      <div class="hprow">
        <div class="bar"><div class="fill" id="php" style="width:${pp}%"></div></div>
        <div class="hpnum" id="phpnum">${combatHp.player}/${combatHp.playerMax}</div>
      </div>
    </div>
    <div class="vs">⚔️</div>
    <div class="combatant enemy">
      <div class="name">${combatEnemy.name}</div>
      <div class="hprow">
        <div class="bar"><div class="fill" id="ehp" style="width:${ep}%"></div></div>
        <div class="hpnum" id="ehpnum">${combatHp.enemy}/${combatHp.enemyMax}</div>
      </div>
    </div>
  </div>`;
}

function streakHtml() {
  if (combatStreak <= 0) return "";
  const flames = "🔥".repeat(Math.min(combatStreak,5));
  return `${flames} Streak ×${combatStreak}`;
}

function updateBars() {
  const pp = pct(combatHp.player, combatHp.playerMax);
  const ep = pct(combatHp.enemy, combatHp.enemyMax);
  const pEl = document.getElementById("php");
  const eEl = document.getElementById("ehp");
  const pNum = document.getElementById("phpnum");
  const eNum = document.getElementById("ehpnum");
  if (pEl) { pEl.style.width = pp+"%"; }
  if (eEl) { eEl.style.width = ep+"%"; }
  if (pNum) pNum.textContent = `${combatHp.player}/${combatHp.playerMax}`;
  if (eNum) eNum.textContent = `${combatHp.enemy}/${combatHp.enemyMax}`;
  const sb = document.getElementById("sbar");
  if (sb) sb.innerHTML = streakHtml();
}

async function submitAnswer(qid, answer) {
  if (combatLocked) return;
  combatLocked = true;

  // Disable all option buttons
  document.querySelectorAll(".opt").forEach(b => b.disabled = true);

  const r = await api("/answer","POST",{session_id:combatId, question_id:qid, answer:answer});
  if (!r) { combatLocked = false; return; }

  // ── Update HP ────────────────────────────────────────────────────────────
  combatHp.player = r.player_hp;
  combatHp.enemy  = r.enemy_hp;
  combatStreak    = r.streak||0;
  combatRound     = r.round||combatRound;
  updateBars();

  // ── Highlight answers ────────────────────────────────────────────────────
  document.querySelectorAll(".opt").forEach(btn => {
    if (btn.textContent === answer) {
      btn.classList.add(r.correct ? "correct" : "wrong");
    }
    if (btn.textContent === r.correct_answer && !r.correct) {
      btn.classList.add("correct");
    }
  });

  // ── Damage pops ──────────────────────────────────────────────────────────
  const eEl = document.getElementById("ehp");
  const pEl = document.getElementById("php");
  if (r.correct && r.damage_dealt > 0) {
    dmgPop(`-${r.damage_dealt}`, "good", eEl);
    log(`✅ Correct! Dealt ${r.damage_dealt} dmg. Streak ×${combatStreak}`);
  } else if (!r.correct) {
    dmgPop(`-${r.enemy_damage}`, "bad", pEl);
    log(`❌ Wrong. Took ${r.enemy_damage} dmg. Streak broken.`);
  }
  if (r.streak_feedback) {
    const sb = document.getElementById("sbar");
    if (sb) sb.innerHTML = `<span style="color:#f1c40f">${r.streak_feedback}</span>`;
  }

  // ── Show explanation ──────────────────────────────────────────────────────
  const explEl = document.getElementById("expl");
  if (explEl && r.explanation) {
    explEl.innerHTML = `<div class="expl ${r.correct?'good':'bad'}">${escHtml(r.explanation)}</div>`;
  }

  // ── Combat over? ─────────────────────────────────────────────────────────
  if (r.combat_over) {
    setTimeout(() => endCombat(r.winner === "player"), 2000);
    return;
  }

  // ── Next question ─────────────────────────────────────────────────────────
  const next = r.next_question;
  setTimeout(() => {
    combatLocked = false;
    if (next && next.question) {
      renderCombat(next);
    } else {
      log("No more questions — combat ends");
      endCombat(true);
    }
  }, 2000);
}

async function endCombat(victory) {
  // Sync player HP from combat state
  const diff = player.hp - combatHp.player;
  if (diff > 0) {
    await api("/api/game/damage","POST",{session_id:gameId, amount:diff});
  }

  let xpGained = 0;
  let levelUp = false;

  if (victory) {
    // Award XP proportional to enemy difficulty
    xpGained = 15 + combatRound * 3;
    const xpR = await api("/api/game/xp","POST",{session_id:gameId, amount:xpGained});
    if (xpR?.level_up) { levelUp = true; }
  }

  await syncPlayer();

  render(`
    <div class="header"><h1>C.R.A.M — The Unbound</h1></div>
    ${playerBar()}
    <div class="cpanel" style="text-align:center; padding:30px">
      <h2 style="font-size:26px; margin-bottom:12px">${victory ? "🏆 Victory!" : "💀 Defeated"}</h2>
      <p style="color:#888; margin-bottom:${xpGained?'8px':'20px'}">
        ${victory
          ? `The ${combatEnemy.name} falls. Knowledge is power.`
          : "The Pale Drift grows stronger. You retreat."}
      </p>
      ${xpGained ? `<p style="color:#f1c40f; margin-bottom:20px">+${xpGained} XP${levelUp?" · <b>LEVEL UP!</b>":""}</p>` : ""}
      <button class="abtn" data-t="navigation" onclick="afterCombat()" style="max-width:220px; margin:0 auto">← Return to Overworld</button>
    </div>
    ${renderLog()}
  `);

  if (levelUp) showLevelUp(player.level);
}

async function afterCombat() {
  combatId = null;
  combatLocked = false;
  renderOverworld();
}

function showLevelUp(level) {
  const el = document.createElement("div");
  el.className = "levelup-flash";
  el.textContent = `⬆️ LEVEL ${level}!`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2600);
}

// ── Insight ────────────────────────────────────────────────────────────────
async function useInsight() {
  if (combatInsightUses <= 0) return;
  const r = await api("/insight","POST",{session_id:combatId});
  if (!r) return;
  combatInsightUses = r.insight_uses ?? combatInsightUses - 1;
  const btn = document.getElementById("insightBtn");
  if (btn) {
    btn.textContent = `💡 Use Insight (${combatInsightUses} left)`;
    if (combatInsightUses <= 0) btn.disabled = true;
  }
  const hintEl = document.getElementById("insightHint");
  if (hintEl) {
    hintEl.innerHTML = `<div class="insight-hint">💡 <b>Insight:</b> ${escHtml(r.hint || "No hint available.")}</div>`;
  }
  log(`💡 Insight used. ${combatInsightUses} remaining.`);
}

// ── Codex viewer ────────────────────────────────────────────────────────────
async function renderCodex() {
  if (!gameId) {
    // No active game — show placeholder
    render(`
      <div class="header"><h1>C.R.A.M — The Unbound</h1></div>
      <div class="codex-panel">
        <h2>📕 Codex — Mistake Journal</h2>
        <div class="codex-sub">Your mistakes from this run will appear here. Start a run first.</div>
        <div class="codex-empty">No active session. Begin a run to start tracking.</div>
      </div>
      <button class="abtn" data-t="navigation" onclick="renderStart()" style="max-width:180px">← Back</button>
    `);
    return;
  }

  const [all, mistakes] = await Promise.all([
    api(`/codex/${gameId}`),
    api(`/codex/${gameId}/mistakes`),
  ]);

  const entries = all?.entries || [];
  const wrongOnes = mistakes?.entries || [];
  const accuracy = entries.length > 0
    ? Math.round(((entries.length - wrongOnes.length) / entries.length) * 100)
    : null;

  // Group by concept
  const concepts = [...new Set(entries.map(e => e.concept_id || e.question_id?.split('_')[0] || 'unknown'))];

  const rowsHtml = entries.length === 0
    ? `<tr><td colspan="5" class="codex-empty">No questions answered yet this run.</td></tr>`
    : entries.map(e => {
        const ok = e.correct;
        return `<tr>
          <td>${escHtml(e.concept_id || '—')}</td>
          <td>${escHtml(e.question_text?.substring(0,60) || e.question_id || '—')}${(e.question_text?.length||0)>60?'…':''}</td>
          <td class="${ok?'codex-ok':'codex-bad'}">${escHtml(e.selected_answer || '—')}</td>
          <td class="codex-ok">${escHtml(e.correct_answer || '—')}</td>
          <td>${escHtml(e.explanation?.substring(0,80)||'—')}${(e.explanation?.length||0)>80?'…':''}</td>
        </tr>`;
      }).join('');

  render(`
    <div class="header"><h1>C.R.A.M — The Unbound</h1></div>
    <div class="codex-panel">
      <h2>📕 Codex — Mistake Journal</h2>
      <div class="codex-sub">
        ${entries.length} questions answered this run.
        ${wrongOnes.length} mistakes.
        ${accuracy !== null ? `Accuracy: <b style="color:#88cc88">${accuracy}%</b>` : ''}
      </div>
      ${wrongOnes.length > 0 ? `
      <div style="background:#1a0a0a;border:1px solid #3a1a1a;border-radius:6px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:#c88">
        ⚠️ Weakest concept this run: <b>${getMostMistaken(wrongOnes)}</b>
      </div>` : ''}
      <div style="overflow-x:auto">
        <table class="codex-table">
          <thead><tr>
            <th>Concept</th><th>Question</th><th>Your Answer</th><th>Correct Answer</th><th>Explanation</th>
          </tr></thead>
          <tbody>${rowsHtml}</tbody>
        </table>
      </div>
    </div>
    <button class="abtn" data-t="navigation" onclick="renderOverworld()" style="max-width:180px">← Overworld</button>
    ${renderLog()}
  `);
}

function getMostMistaken(wrongEntries) {
  const counts = {};
  wrongEntries.forEach(e => {
    const c = e.concept_id || e.question_id?.split('_')[0] || 'unknown';
    counts[c] = (counts[c]||0) + 1;
  });
  return Object.entries(counts).sort((a,b)=>b[1]-a[1])[0]?.[0] || 'unknown';
}

// ── Equipment picker ─────────────────────────────────────────────────────────
const WEAPONS_CATALOG = {
  "none":            { name:"Bare Hands",      stat:"+0% damage",    ability:"None" },
  "binary_blade":    { name:"Binary Blade",    stat:"+15% damage",   ability:"Binary Strike: +50% on hit" },
  "recursive_staff": { name:"Recursive Staff", stat:"+10% damage",   ability:"Recursive Echo: deal 30% of last hit again" },
  "balance_edge":    { name:"Balance Edge",    stat:"+8% damage",    ability:"Balance Shift: +40% damage reduction on wrong" },
};
const ARMORS_CATALOG = {
  "none":        { name:"No Armor",    stat:"0% reduction" },
  "data_vest":   { name:"Data Vest",   stat:"15% damage reduction" },
  "stack_plate": { name:"Stack Plate", stat:"25% damage reduction" },
};

async function renderEquipment() {
  const selectedWeapon = player.weapon_id || "none";
  const selectedArmor  = player.armor_id  || "none";

  const weaponCards = Object.entries(WEAPONS_CATALOG).map(([id, w]) => `
    <div class="equip-card ${selectedWeapon===id?'selected':''}" onclick="selectWeapon('${id}')">
      <div class="eq-name">⚔️ ${escHtml(w.name)}</div>
      <div class="eq-stat">${escHtml(w.stat)}</div>
      <div class="eq-stat" style="color:#776">${escHtml(w.ability)}</div>
    </div>
  `).join('');

  const armorCards = Object.entries(ARMORS_CATALOG).map(([id, a]) => `
    <div class="equip-card ${selectedArmor===id?'selected':''}" onclick="selectArmor('${id}')">
      <div class="eq-name">🛡️ ${escHtml(a.name)}</div>
      <div class="eq-stat">${escHtml(a.stat)}</div>
    </div>
  `).join('');

  render(`
    <div class="header"><h1>C.R.A.M — The Unbound</h1></div>
    ${playerBar()}
    <div class="equip-panel">
      <h2>🔧 Equipment</h2>
      <div class="equip-section">
        <h3>Weapons</h3>
        ${weaponCards}
      </div>
      <div class="equip-section">
        <h3>Armor</h3>
        ${armorCards}
      </div>
      <div id="equip-confirm" style="margin-top:10px;font-size:13px;color:#888"></div>
    </div>
    <button class="abtn" data-t="navigation" onclick="renderOverworld()" style="max-width:180px">← Overworld</button>
    ${renderLog()}
  `);
}

async function selectWeapon(id) {
  if (!gameId) return;
  const r = await api("/api/game/equip","POST",{session_id:gameId, weapon_id:id});
  if (!r) return;
  player.weapon_id = r.weapon_id;
  log(`⚔️ Equipped: ${WEAPONS_CATALOG[id]?.name}`);
  renderEquipment();
}

async function selectArmor(id) {
  if (!gameId) return;
  const r = await api("/api/game/equip","POST",{session_id:gameId, armor_id:id});
  if (!r) return;
  player.armor_id = r.armor_id;
  log(`🛡️ Equipped: ${ARMORS_CATALOG[id]?.name}`);
  renderEquipment();
}

// ── Utils ──────────────────────────────────────────────────────────────────
function escHtml(s) {
  if (!s) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function escAttr(s) {
  if (!s) return "";
  return String(s).replace(/'/g,"\\'").replace(/"/g,'\\"');
}

// ── Init ───────────────────────────────────────────────────────────────────
renderStart();
</script>
