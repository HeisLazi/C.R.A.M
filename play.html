<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>C.R.A.M — The Unbound</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }
    body { height: 100%; overflow: hidden; background: #05050d; color: #d4d4d4; font-family: 'Space Grotesk', 'Segoe UI', system-ui, sans-serif; }
    #app { height: 100%; overflow-y: auto; max-width: 1200px; margin: 0 auto; padding: 24px 40px; scrollbar-width: thin; scrollbar-color: #1a1a30 transparent; position:relative; z-index:1; }

    /* ── Animated background ──────────────────────────────────────── */
    #cram-bg {
      position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, #0d0430 0%, #05050d 55%);
    }
    /* Star layers — three CSS-only star fields at different speeds/sizes */
    #cram-bg .stars-s, #cram-bg .stars-m, #cram-bg .stars-l {
      position:absolute; inset:0;
      background-image:
        radial-gradient(1px 1px at 10% 15%, rgba(200,162,255,.55) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 40%, rgba(180,150,255,.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 40% 8%, rgba(220,200,255,.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 60%, rgba(160,130,220,.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 25%, rgba(200,170,255,.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 75%, rgba(180,160,255,.35) 0%, transparent 100%),
        radial-gradient(1px 1px at 15% 85%, rgba(200,180,255,.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 92% 12%, rgba(220,210,255,.45) 0%, transparent 100%),
        radial-gradient(1px 1px at 33% 70%, rgba(180,150,240,.35) 0%, transparent 100%),
        radial-gradient(1px 1px at 78% 50%, rgba(200,160,255,.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 48% 90%, rgba(170,140,220,.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 62% 35%, rgba(210,185,255,.45) 0%, transparent 100%),
        radial-gradient(1px 1px at 5% 52%, rgba(190,165,250,.35) 0%, transparent 100%),
        radial-gradient(1px 1px at 88% 38%, rgba(200,175,255,.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 22% 22%, rgba(215,195,255,.5) 0%, transparent 100%);
      background-size: 100% 100%;
    }
    #cram-bg .stars-s { animation: drift-s 90s linear infinite; opacity:.7; }
    #cram-bg .stars-m {
      background-image:
        radial-gradient(1.5px 1.5px at 18% 30%, rgba(200,162,255,.45) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 43% 65%, rgba(180,150,255,.35) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 67% 18%, rgba(210,185,255,.5) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 82% 82%, rgba(190,160,240,.4) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 30% 50%, rgba(200,170,255,.35) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 75% 42%, rgba(215,190,255,.4) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 55% 78%, rgba(180,155,235,.35) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 8%  60%, rgba(205,178,255,.4) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 94% 55%, rgba(195,168,250,.35) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 50% 20%, rgba(220,200,255,.5) 0%, transparent 100%);
      animation: drift-m 140s linear infinite; opacity:.65;
    }
    #cram-bg .stars-l {
      background-image:
        radial-gradient(2px 2px at 20% 10%, rgba(200,162,255,.3) 0%, transparent 100%),
        radial-gradient(2px 2px at 60% 55%, rgba(180,150,255,.25) 0%, transparent 100%),
        radial-gradient(2px 2px at 80% 20%, rgba(210,185,255,.35) 0%, transparent 100%),
        radial-gradient(2px 2px at 35% 80%, rgba(190,160,240,.25) 0%, transparent 100%),
        radial-gradient(2px 2px at 95% 70%, rgba(200,170,255,.3) 0%, transparent 100%),
        radial-gradient(2px 2px at 45% 40%, rgba(215,190,255,.3) 0%, transparent 100%);
      animation: drift-l 200s linear infinite; opacity:.6;
    }
    @keyframes drift-s { 0%{transform:translateY(0)} 100%{transform:translateY(-8px)} }
    @keyframes drift-m { 0%{transform:translateY(0) translateX(0)} 50%{transform:translateY(-5px) translateX(3px)} 100%{transform:translateY(0) translateX(0)} }
    @keyframes drift-l { 0%{transform:translateY(0) translateX(0)} 33%{transform:translateY(-4px) translateX(-3px)} 66%{transform:translateY(2px) translateX(4px)} 100%{transform:translateY(0) translateX(0)} }

    /* Ambient glow orbs */
    #cram-bg .orb { position:absolute; border-radius:50%; filter:blur(60px); }
    #cram-bg .orb-1 {
      width:320px; height:200px; top:-80px; left:calc(50% - 160px);
      background:radial-gradient(ellipse,rgba(80,20,160,.18) 0%,transparent 70%);
      animation:orb-pulse 8s ease-in-out infinite;
    }
    #cram-bg .orb-2 {
      width:220px; height:180px; bottom:10%; left:5%;
      background:radial-gradient(ellipse,rgba(20,50,120,.12) 0%,transparent 70%);
      animation:orb-pulse 11s ease-in-out 2s infinite;
    }
    #cram-bg .orb-3 {
      width:180px; height:140px; bottom:15%; right:6%;
      background:radial-gradient(ellipse,rgba(60,10,110,.14) 0%,transparent 70%);
      animation:orb-pulse 14s ease-in-out 5s infinite;
    }
    @keyframes orb-pulse { 0%,100%{opacity:.6;transform:scale(1)} 50%{opacity:1;transform:scale(1.12)} }

    /* CRT scanlines — barely visible, retro feel */
    #cram-bg .scanlines {
      position:absolute; inset:0;
      background:repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 3px,
        rgba(0,0,0,.08) 3px, rgba(0,0,0,.08) 4px
      );
      pointer-events:none;
    }
    /* Subtle pixel grid */
    #cram-bg .pixgrid {
      position:absolute; inset:0; opacity:.025;
      background-image:
        linear-gradient(rgba(140,100,255,.6) 1px, transparent 1px),
        linear-gradient(90deg, rgba(140,100,255,.6) 1px, transparent 1px);
      background-size:32px 32px;
      animation:grid-drift 30s linear infinite;
    }
    @keyframes grid-drift { 0%{background-position:0 0} 100%{background-position:32px 32px} }
    #app::-webkit-scrollbar { width: 6px; }
    #app::-webkit-scrollbar-track { background: transparent; }
    #app::-webkit-scrollbar-thumb { background: #1a1a30; border-radius: 3px; }

    /* ── Header ─────────────────────────────────────────────────────── */
    .header { text-align:center; padding:18px 0 8px; border-bottom:1px solid #1a1a2e; margin-bottom:16px; }
    .header h1 { color:#c8a2ff; font-size:20px; letter-spacing:3px; font-family:'Press Start 2P', monospace; line-height:1.4; }
    .header .sub { color:#555; font-size:11px; margin-top:3px; }

    /* ── Player bar ─────────────────────────────────────────────────── */
    .pbar { display:flex; gap:18px; justify-content:center; align-items:center;
            padding:10px 16px; background:#0e0e1a; border-radius:8px; margin-bottom:16px; font-size:13px; }
    .pbar .s { color:#777; }
    .pbar .s b { color:#eee; }
    .pbar .hp-bar { width:120px; height:8px; background:#2a0a0a; border-radius:4px; overflow:hidden; display:inline-block; margin-left:6px; vertical-align:middle; }
    .pbar .hp-fill { height:100%; background:#c0392b; border-radius:4px; transition:width 0.4s; }
    .pbar .xp-bar { width:80px; height:8px; background:#1a1a0a; border-radius:4px; overflow:hidden; display:inline-block; margin-left:6px; vertical-align:middle; }
    .pbar .xp-fill { height:100%; background:#f1c40f; border-radius:4px; transition:width 0.4s; }

    /* ── World Map (spatial) ────────────────────────────────────────── */
    .map-scroll-outer {
      margin:10px 0 12px; border:1px solid #12121e; border-radius:12px;
      overflow:hidden; background:#040812;
    }
    .map-scroll-bg {
      background:
        radial-gradient(ellipse 70% 55% at 15% 50%, rgba(90,50,180,0.07) 0%, transparent 65%),
        radial-gradient(ellipse 50% 70% at 85% 25%, rgba(180,80,40,0.05) 0%, transparent 65%),
        repeating-linear-gradient(90deg, transparent 0, transparent 109px, rgba(255,255,255,0.012) 110px),
        repeating-linear-gradient(0deg,  transparent 0, transparent 59px,  rgba(255,255,255,0.012) 60px),
        #040812;
      overflow-x:auto; overflow-y:hidden;
      padding:8px; cursor:grab; scroll-behavior:smooth; -webkit-overflow-scrolling:touch;
    }
    .map-scroll-bg:active { cursor:grabbing; }
    .map-canvas { position:relative; }
    .map-svg { overflow:visible; pointer-events:none; position:absolute; top:0; left:0; }
    /* Node circles */
    .map-node {
      position:absolute; border-radius:50%;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      transition:transform 0.15s; user-select:none; cursor:default;
      background:#070b14; border:2px solid; overflow:visible;
    }
    .map-node .mn-icon { font-size:16px; line-height:1; pointer-events:none; font-style:normal; }
    .map-node .mn-label {
      position:absolute; top:calc(100% + 4px); left:50%; transform:translateX(-50%);
      font-size:9px; color:#555; white-space:nowrap; pointer-events:none; text-align:center;
    }
    .mn-current  { cursor:pointer!important; animation:pulse-cur 2s infinite; }
    .mn-reachable{ cursor:pointer!important; animation:breathe-reach 1.8s infinite; }
    .mn-reachable:hover { transform:scale(1.28)!important; }
    .mn-fog      { opacity:0.15!important; pointer-events:none; }
    .mn-cleared  { opacity:0.4; }
    .mn-visited  { opacity:0.75; }
    .mn-locked   { cursor:not-allowed!important; opacity:0.55; filter:sepia(0.6) hue-rotate(-20deg); }
    @keyframes pulse-cur    { 0%,100%{box-shadow:0 0 8px var(--nc,#888)}  50%{box-shadow:0 0 22px var(--nc,#888),0 0 44px var(--nc,#888)} }
    @keyframes breathe-reach{ 0%,100%{box-shadow:0 0 4px var(--nc,#888)}  50%{box-shadow:0 0 14px var(--nc,#888)} }
    /* Location card under map */
    .map-loc-card {
      display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px;
      background:#070710; border:1px solid #10101c; border-radius:8px;
      padding:9px 14px; margin-bottom:10px; font-size:12px;
    }
    .mlc-left { display:flex; align-items:center; gap:8px; }
    .mlc-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .mlc-name { color:#ccc; font-weight:bold; }
    .mlc-meta { color:#3a3a4a; font-size:11px; margin-left:4px; }
    .mlc-legend { display:flex; gap:10px; flex-wrap:wrap; color:#383848; }
    .mlc-legend span { display:flex; align-items:center; gap:4px; }

    /* ── Node panel ─────────────────────────────────────────────────── */
    .npanel { background:#0a0b14; border:1px solid #1a1a30; border-radius:10px; padding:18px; margin-bottom:14px; transition:border-color 0.3s; }
    .np-top { display:flex; align-items:flex-start; gap:14px; margin-bottom:12px; }
    .np-icon { font-size:36px; line-height:1; flex-shrink:0; margin-top:2px; }
    .np-info { flex:1; }
    .npanel h2 { font-size:18px; margin-bottom:6px; }
    .np-tags { display:flex; gap:6px; flex-wrap:wrap; }
    .npill { font-size:10px; padding:2px 8px; border-radius:20px; background:#0d0d18; border:1px solid #1a1a28; color:#555; white-space:nowrap; }
    .npill-cleared  { color:#338844!important; border-color:#1a3a22!important; background:#0a150a!important; }
    .npill-visited  { color:#555588!important; border-color:#22223a!important; }
    .npill-unvisited{ color:#333355!important; border-color:#15151e!important; }
    .np-desc { color:#4a4a5a; font-size:13px; line-height:1.65; margin-bottom:16px; font-style:italic; border-left:2px solid #1a1a28; padding-left:12px; }
    .np-actions { display:flex; flex-direction:column; gap:0; }
    .nmeta { color:#555; font-size:12px; margin-bottom:14px; }
    .nmeta span { margin-right:12px; }

    .abtn {
      display:block; width:100%; text-align:left; padding:11px 15px; margin-bottom:7px;
      background:#12121e; border:1px solid #1e1e30; border-radius:7px;
      color:#bbb; font-size:13px; cursor:pointer; transition:all 0.12s;
    }
    .abtn:hover { background:#18182a; border-color:#3a3a66; color:#eee; }
    .abtn[data-t="combat"]    { border-left:3px solid #ff4444; }
    .abtn[data-t="challenge"] { border-left:3px solid #aa44ff; }
    .abtn[data-t="utility"]   { border-left:3px solid #44cc77; }
    .abtn[data-t="info"]      { border-left:3px solid #44aaff; }
    .abtn[data-t="anomaly"]   { border-left:3px solid #aa00ee; color:#cc44ff; }
    .abtn[data-t="event"]     { border-left:3px solid #ffaa44; }
    .abtn[data-t="navigation"]{ border-left:3px solid #444; color:#777; }

    /* ── Combat (legacy) ───────────────────────────────────────────── */
    .cpanel { background:#0f0808; border:1px solid #2a1010; border-radius:10px; padding:18px; margin-bottom:14px; }
    .expl { margin-top:10px; padding:10px; border-radius:6px; font-size:13px; line-height:1.5; }
    .expl.good { background:#0a1f0a; border:1px solid #1a4a1a; color:#8d8; }
    .expl.bad  { background:#1f0a0a; border:1px solid #4a1a1a; color:#d88; }

    /* Click-to-proceed button (shown after every answer) */
    .combat-proceed {
      margin-top:12px; width:100%; padding:11px 0;
      background:#0c0c20; border:1px solid #2a2a50; border-radius:8px;
      color:#9988cc; font-size:13px; font-weight:600; letter-spacing:0.5px;
      cursor:pointer; transition:all 0.15s;
      display:flex; align-items:center; justify-content:center; gap:8px;
    }
    .combat-proceed:hover { background:#141430; border-color:#5544aa; color:#c8b8ff; }
    .combat-proceed.wrong-proceed {
      border-color:#4a1a1a; color:#cc8888;
      background:#140a0a;
    }
    .combat-proceed.wrong-proceed:hover { background:#1e0e0e; border-color:#8a3333; color:#ffaaaa; }
    /* Correct answer label shown on wrong answers */
    .correct-reveal {
      margin-top:8px; padding:10px 14px; background:#071807; border:1px solid #1a5a1a;
      border-radius:7px; font-size:13px; color:#88cc88; line-height:1.5;
    }
    .correct-reveal strong { color:#aaffaa; }

    /* ── Battle Arena ──────────────────────────────────────────────── */
    .battle-wrap { margin-bottom:14px; }
    .battle-arena {
      position:relative; overflow:hidden;
      background:linear-gradient(175deg,#020208 0%,#06030f 40%,#0a0420 75%,#0d0828 100%);
      border:1px solid #1a0838; border-radius:10px; margin-bottom:10px;
    }
    .battle-fighters {
      display:flex; align-items:flex-end; justify-content:space-between;
      padding:18px 20px 38px; min-height:220px; position:relative;
    }
    .battle-ground { position:absolute; bottom:28px; left:0; right:0; height:1px;
      background:linear-gradient(90deg,transparent,#2a0f50 20%,#5a1aaa 50%,#2a0f50 80%,transparent); }
    /* Center area */
    .bc { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px; padding:0 10px; }
    .bc-round { color:#1e1e30; font-size:9px; letter-spacing:2px; text-transform:uppercase; }
    .bc-streak { font-size:15px; min-height:20px; text-align:center; }
    .bc-equip { font-size:9px; color:#1c1c2c; text-align:center; margin-top:2px; }
    /* Fighter wrapper */
    .fw { display:flex; flex-direction:column; align-items:center; gap:8px; }
    .fw-hprow { display:flex; flex-direction:column; align-items:center; gap:3px; width:136px; }
    .fw-name { font-size:9px; color:#555; letter-spacing:1.5px; text-transform:uppercase; }
    .fw-track { width:100%; height:8px; background:#060610; border-radius:4px; overflow:hidden; border:1px solid #12121e; }
    .fw-fill { height:100%; border-radius:4px; transition:width 0.55s ease; }
    .fw-fill.plr { background:linear-gradient(90deg,#7a1515,#c0392b,#e74c3c,#ff7070); }
    .fw-fill.enm { background:linear-gradient(90deg,#3a0860,#7a2aaa,#9b44cc,#bb66ee); }
    .fw-hpnum { font-size:10px; color:#3a3a4a; }
    /* Sprite area */
    .sp-area {
      position:relative; display:flex; align-items:flex-end; justify-content:center;
      width:80px; height:118px; animation:sp-float 3.2s ease-in-out infinite;
    }
    .sp-area.boss-sz { width:104px; height:140px; }
    .sp-area svg { max-width:100%; max-height:100%; }
    .sp-shadow { position:absolute; bottom:-6px; width:55%; height:7px; background:rgba(0,0,0,0.45); border-radius:50%; filter:blur(3px); }
    /* Particles */
    .bp { position:absolute; width:2px; height:2px; border-radius:50%; opacity:0; pointer-events:none;
          animation:bp-rise var(--pd,4s) ease-in-out var(--bd,0s) infinite;
          left:var(--bx); top:var(--by); background:var(--bc,#c8a2ff); }
    /* Animations */
    @keyframes sp-float  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
    @keyframes bp-rise   { 0%,100%{opacity:0;transform:translateY(0) scale(1)} 30%{opacity:.7} 80%{opacity:.2} 100%{opacity:0;transform:translateY(-28px) scale(.3)} }
    @keyframes fw-lunge  { 0%{transform:translateX(0)} 35%{transform:translateX(68px) scaleX(1.06)} 65%{transform:translateX(68px)} 100%{transform:translateX(0)} }
    @keyframes fw-phurt  { 0%,100%{transform:translateX(0);filter:brightness(1)} 20%{transform:translateX(-14px);filter:brightness(1.6) sepia(1) hue-rotate(290deg) saturate(8)} 50%{transform:translateX(8px);filter:brightness(2) sepia(1) hue-rotate(290deg) saturate(10)} 75%{transform:translateX(-5px);filter:brightness(1.3)} }
    @keyframes fw-ehurt  { 0%,100%{transform:translateX(0);filter:brightness(1)} 20%{transform:translateX(18px);filter:brightness(3.5) saturate(6) hue-rotate(255deg)} 50%{transform:translateX(-10px);filter:brightness(2)} 75%{transform:translateX(6px)} }
    @keyframes fw-edie   { 0%{transform:translateX(0) rotate(0deg) translateY(0);opacity:1} 25%{transform:translateX(12px) rotate(8deg) translateY(-6px);opacity:.8;filter:brightness(2)} 60%{transform:translateX(38px) rotate(48deg) translateY(22px);opacity:.4} 100%{transform:translateX(70px) rotate(88deg) translateY(52px);opacity:0} }
    .fw.attacking  { animation:fw-lunge .55s ease; }
    .fw.plr-hit    { animation:fw-phurt .65s ease; }
    .fw.enm-hit    { animation:fw-ehurt .55s ease; }
    .fw.enm-dying  { animation:fw-edie 1.4s ease forwards; }
    .fw.attacking .sp-area,.fw.plr-hit .sp-area,.fw.enm-hit .sp-area,.fw.enm-dying .sp-area { animation:none; }
    /* Battle question box */
    .bqbox { background:#070710; border:1px solid #11112a; border-radius:10px; padding:16px; }
    .bqconcept { font-size:10px; color:#44446a; text-transform:uppercase; letter-spacing:1px; margin-bottom:9px; display:flex; gap:5px; align-items:center; flex-wrap:wrap; }
    .bqtext { color:#ddd; font-size:14px; line-height:1.65; margin-bottom:13px; }
    .bqtext-lg { font-size:15px; line-height:1.75; }
    .boptgrid { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:10px; }
    .bopt { padding:10px 12px; background:#0c0c1e; border:1px solid #1c1c32; border-radius:7px; color:#bbb; font-size:13px; cursor:pointer; transition:all .12s; text-align:left; width:100%; }
    .bopt:hover:not(:disabled) { background:#141428; border-color:#3a3a66; color:#eee; }
    .bopt:disabled { cursor:default; opacity:.7; }
    .bopt.correct { background:#0a2a0a!important; border-color:#2a7a2a!important; color:#8f8!important; }
    .bopt.wrong   { background:#2a0a0a!important; border-color:#7a2a2a!important; color:#f88!important; }
    .bfoot { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-top:8px; flex-wrap:wrap; }

    /* ── Question type badges ─────────────────────────────────────── */
    .qbadge { display:inline-block; padding:2px 7px; border-radius:3px; font-size:9px; font-weight:bold; letter-spacing:0.5px; color:#fff; }

    /* ── True/False layout ──────────────────────────────────────────── */
    .tf-grid { grid-template-columns:1fr 1fr; }
    .tf-opt  { padding:14px 12px; font-size:15px; text-align:center; font-weight:bold; }

    /* ── Open-ended question input ──────────────────────────────────── */
    .open-q-wrap  { display:flex; flex-direction:column; gap:8px; margin-bottom:10px; }
    .open-q-frame { font-size:11px; color:#6060a0; font-style:italic; }
    .open-q-input { background:#08080f; border:1px solid #1a1a2e; border-radius:6px; color:#ccc; font-size:13px; padding:10px 12px; resize:vertical; min-height:70px; font-family:inherit; line-height:1.5; }
    .open-q-lg    { min-height:130px; }
    .open-q-input:focus { outline:none; border-color:#3a3a66; }
    .open-q-submit { align-self:flex-end; padding:8px 20px; background:#0f0f24; border:1px solid #3030aa; color:#88aaff; border-radius:6px; cursor:pointer; font-size:13px; }
    .open-q-submit:hover { background:#1a1a3a; }

    /* ── Self-eval panel ────────────────────────────────────────────── */
    .self-eval-panel { background:#06060e; border:1px solid #1e1e3e; border-radius:8px; padding:14px; }
    .sep-loading  { color:#555; font-size:13px; }
    .sep-title    { font-size:11px; color:#7a5aaa; font-weight:bold; letter-spacing:1px; margin-bottom:8px; }
    .sep-body     { color:#ccc; font-size:13px; line-height:1.6; margin-bottom:8px; background:#0a0a18; padding:10px; border-radius:5px; }
    .sep-expl     { color:#888; font-size:12px; font-style:italic; margin-bottom:10px; }
    .sep-question { color:#777; font-size:12px; margin-bottom:4px; }

    /* ── Anomaly warning screen ─────────────────────────────────────── */
    .anomaly-warning { background:linear-gradient(175deg,#06000f,#0d0022,#140035);
      border:1px solid #4a007a; border-radius:12px; padding:36px 24px; text-align:center; margin-bottom:14px; }
    .aw-icon  { font-size:44px; margin-bottom:12px; }
    .aw-title { font-size:24px; color:#cc44ff; letter-spacing:3px; margin-bottom:8px; font-weight:bold; }
    .aw-sub   { color:#9955cc; font-size:14px; margin-bottom:18px; }
    .aw-body  { color:#aaa; font-size:14px; line-height:1.8; max-width:380px; margin:0 auto 14px; }
    .aw-debuffs { color:#5a3a7a; font-size:11px; font-style:italic; margin-bottom:4px; }

    /* ── Anomaly combat badge ────────────────────────────────────────── */
    .anomaly-badge { background:#1a003a; border:1px solid #5a0088; color:#cc44ff; font-size:10px;
      padding:4px 10px; border-radius:4px; margin-bottom:10px; letter-spacing:1px; text-align:center; }

    /* ── Debuff display ─────────────────────────────────────────────── */
    .debuff-row   { display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
    .debuff-chip  { background:#1a0028; border:1px solid #4a0066; color:#cc44ff; font-size:9px;
      padding:2px 8px; border-radius:3px; white-space:nowrap; }
    .debuff-result { background:#1a0028; border:1px solid #4a0066; border-radius:8px; padding:16px; margin:16px auto; max-width:340px; }
    .dr-icon  { font-size:32px; margin-bottom:8px; }
    .dr-name  { color:#cc44ff; font-size:16px; font-weight:bold; margin-bottom:6px; }
    .dr-desc  { color:#999; font-size:13px; line-height:1.5; }

    /* Victory / defeat screen */
    .battle-result { background:linear-gradient(175deg,#020208,#060318,#0a0420); border:1px solid; border-radius:10px; padding:36px 20px; text-align:center; margin-bottom:14px; }
    .br-title { font-size:30px; margin-bottom:10px; }
    .br-sub { color:#555; font-size:13px; margin-bottom:18px; }
    .br-xp { color:#f1c40f; font-size:16px; margin-bottom:22px; }

    /* ── Damage flash ───────────────────────────────────────────────── */
    @keyframes pop { 0%{transform:translateY(0);opacity:1} 100%{transform:translateY(-30px);opacity:0} }
    .dmg-pop { position:fixed; font-size:22px; font-weight:bold; pointer-events:none; animation:pop 1.2s ease forwards; z-index:999; }
    .dmg-pop.good { color:#ff5555; }
    .dmg-pop.bad  { color:#cc44ff; }
    .dmg-pop.heal { color:#55ff88; }

    /* ── Result boxes ───────────────────────────────────────────────── */
    .rbox { padding:12px; border-radius:8px; margin:10px 0; font-size:13px; line-height:1.5; }
    .rbox.good { background:#0a1e0a; border:1px solid #1a3e1a; color:#7d7; }
    .rbox.bad  { background:#1e0a0a; border:1px solid #3e1a1a; color:#d77; }
    .rbox.info { background:#0a0a1e; border:1px solid #1a1a3e; color:#77d; }

    /* ── Log ────────────────────────────────────────────────────────── */
    .log { background:#060609; border:1px solid #111; border-radius:7px; padding:8px 12px;
           max-height:120px; overflow-y:auto; font-size:11px; font-family:monospace; color:#444; margin-top:12px; }
    .log div { padding:1px 0; }

    /* ── Start Screen (overhauled) ──────────────────────────────────── */
    .start-screen {
      min-height:90vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding:40px 20px; position:relative; overflow:hidden;
    }
    .start-screen::before {
      content:''; position:absolute; inset:0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 30%, rgba(120,60,220,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 20% 80%, rgba(80,20,180,0.08) 0%, transparent 60%);
      pointer-events:none;
    }
    .start-logo { position:relative; margin-bottom:8px; }
    .start-logo h1 {
      font-size:28px; letter-spacing:4px; font-weight:900;
      font-family:'Press Start 2P', monospace; line-height:1.5;
      background:linear-gradient(135deg, #c8a2ff 0%, #8866cc 50%, #5533aa 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .start-logo .sub-title { color:#4a3a6a; font-size:12px; letter-spacing:6px; text-transform:uppercase; margin-top:2px; text-align:center; }
    .start-divider { width:200px; height:1px; background:linear-gradient(90deg,transparent,#4a2a7a,transparent); margin:20px auto; }
    .start-lore { color:#3a2a5a; font-size:13px; text-align:center; max-width:320px; margin-bottom:32px; font-style:italic; line-height:1.7; }
    .start-menu { display:flex; flex-direction:column; gap:10px; width:100%; max-width:340px; }
    .start-btn-main {
      padding:16px 24px; border-radius:10px; cursor:pointer; transition:all 0.2s;
      text-align:left; display:flex; align-items:center; gap:14px; border:1px solid;
      font-size:15px; font-weight:600; letter-spacing:0.5px;
    }
    .start-btn-main:hover { transform:translateX(4px); }
    .sb-run   { background:#120820; border-color:#5a2a9a; color:#c8a2ff; }
    .sb-run:hover { background:#1a1030; border-color:#8a50cc; }
    .sb-pp    { background:#0a1820; border-color:#1a4a6a; color:#88ccff; }
    .sb-pp:hover { background:#0e2030; border-color:#3a8abb; }
    .sb-codex { background:#0a1a0a; border-color:#1a4a1a; color:#88cc88; }
    .sb-codex:hover { background:#0e200e; border-color:#2a6a2a; }
    .sb-subject { background:#110a05; border-color:#3a2a0a; color:#cc9944; }
    .sb-subject:hover { background:#180e08; border-color:#6a4a1a; }
    .sb-library { background:#070d18; border-color:#1a3a5a; color:#7ab8dd; }
    .sb-library:hover { background:#0a1525; border-color:#2a6a9a; }
    .sb-tutorial { background:#060d06; border-color:#2a6a2a; color:#88dd88; }
    .sb-tutorial:hover { background:#0a160a; border-color:#44aa44; }

    /* ── Sir GetRICH dialogue overlay ───────────────────────────────── */
    /* Normal mode: bottom-center, near the main content */
    .tutor-overlay {
      position:fixed; bottom:0; left:0; right:0; z-index:999;
      display:flex; align-items:flex-end; justify-content:center;
      padding:0 16px 18px; pointer-events:none;
    }
    .tutor-overlay.visible { pointer-events:all; }
    .tutor-box {
      display:flex; align-items:flex-end; gap:16px;
      max-width:640px; width:100%;
      transform:translateY(120%); opacity:0;
      transition:transform 0.35s cubic-bezier(0.34,1.2,0.64,1), opacity 0.3s ease;
    }
    .tutor-overlay.visible .tutor-box { transform:translateY(0); opacity:1; }
    .tutor-sprite-wrap {
      flex-shrink:0; width:80px; height:110px; display:flex; align-items:flex-end;
    }
    .tutor-sprite-wrap svg { width:100%; height:100%; filter:drop-shadow(0 0 10px rgba(240,192,0,0.4)); }
    .tutor-bubble {
      background:#0a1208; border:2px solid #2a7a2a; border-radius:14px;
      padding:14px 16px; flex:1; position:relative;
      box-shadow:0 4px 32px rgba(0,200,0,0.14), 0 0 0 1px rgba(100,200,100,0.05);
    }
    .tutor-bubble::before {
      content:''; position:absolute; bottom:22px; left:-10px;
      width:0; height:0;
      border-top:8px solid transparent; border-bottom:8px solid transparent;
      border-right:10px solid #2a7a2a;
    }
    .tutor-bubble::after {
      content:''; position:absolute; bottom:23px; left:-7px;
      width:0; height:0;
      border-top:7px solid transparent; border-bottom:7px solid transparent;
      border-right:9px solid #0a1208;
    }
    .tutor-name {
      color:#f0c000; font-size:12px; font-weight:800; letter-spacing:1px;
      margin-bottom:7px; display:flex; align-items:center; gap:6px;
    }
    .tutor-name::after { content:'💰'; font-size:13px; }
    .tutor-text { color:#c8e8c8; font-size:13px; line-height:1.65; }
    .tutor-btn {
      margin-top:10px; padding:6px 16px; background:#1a4a1a; border:1px solid #3a8a3a;
      color:#88ee88; border-radius:6px; cursor:pointer; font-size:12px; font-weight:700;
      transition:all 0.15s; letter-spacing:0.5px;
    }
    .tutor-btn:hover { background:#244a24; border-color:#55cc55; color:#aaffaa; }

    /* Intro mode: fullscreen centered, large sprite */
    .tutor-overlay.intro-mode {
      align-items:center; justify-content:center;
      background:rgba(5,5,13,0.96); backdrop-filter:blur(4px);
      padding:0;
    }
    .tutor-overlay.intro-mode .tutor-box {
      flex-direction:column; align-items:center; max-width:480px;
      gap:20px;
    }
    .tutor-overlay.intro-mode .tutor-sprite-wrap {
      width:140px; height:190px;
    }
    .tutor-overlay.intro-mode .tutor-bubble {
      width:100%; text-align:center;
    }
    .tutor-overlay.intro-mode .tutor-bubble::before,
    .tutor-overlay.intro-mode .tutor-bubble::after { display:none; }
    .tutor-overlay.intro-mode .tutor-name {
      justify-content:center; font-size:15px;
    }
    .tutor-overlay.intro-mode .tutor-text { font-size:15px; }
    .tutor-overlay.intro-mode .tutor-btn {
      padding:10px 28px; font-size:14px; width:100%; margin-top:14px;
    }

    /* Tutorial world map (linear) */
    .tutorial-map { display:flex; flex-direction:column; align-items:center; gap:8px; padding:10px 0; }
    .tut-node {
      display:flex; align-items:center; gap:12px; padding:12px 18px; width:280px;
      border-radius:10px; border:1px solid #2a3a2a; background:#060d06;
    }
    .tut-node.active { border-color:#44aa44; background:#0a180a; }
    .tut-node.cleared { border-color:#2a4a2a; opacity:0.6; }
    .tut-node-icon { font-size:22px; }
    .tut-node-info { flex:1; }
    .tut-node-name { font-size:13px; font-weight:700; color:#88cc88; }
    .tut-node-desc { font-size:11px; color:#2a4a2a; margin-top:2px; }
    .tut-connector { width:2px; height:20px; background:#1a3a1a; }
    /* Subject Switcher screen */
    .subject-switcher { max-width:460px; margin:0 auto; padding:0 4px; }
    .subject-switcher h2 { color:#cc9944; font-size:18px; letter-spacing:1px; margin-bottom:4px; }
    .subject-switcher p  { color:#5a4a2a; font-size:12px; margin-bottom:18px; }
    .subject-card { background:#0d0800; border:1px solid #2a1a05; border-radius:10px; padding:14px 16px;
      cursor:pointer; transition:all 0.15s; display:flex; align-items:center; gap:14px; margin-bottom:8px; }
    .subject-card:hover { border-color:#6a4a1a; background:#130e04; }
    .subject-card.active-subject { border-color:#cc9944; background:#120c02; }
    .subject-card-icon { font-size:26px; flex-shrink:0; }
    .subject-card-info { flex:1; }
    .subject-card-name { color:#cc9944; font-size:15px; font-weight:bold; letter-spacing:0.5px; }
    .subject-card-meta { color:#4a3a1a; font-size:11px; margin-top:2px; }
    .subject-card-active-badge { background:#2a1a00; border:1px solid #6a4a1a; color:#cc9944;
      font-size:10px; padding:2px 8px; border-radius:10px; letter-spacing:0.5px; flex-shrink:0; }
    .subject-hint { background:#080500; border:1px dashed #2a1a05; border-radius:8px;
      padding:16px 18px; color:#3a2a10; font-size:12px; margin-top:12px; line-height:1.6; }
    .subject-hint code { color:#6a4a1a; background:#0f0a00; border-radius:3px; padding:1px 5px; font-size:11px; }
    .start-btn-main .sb-icon { font-size:22px; flex-shrink:0; }
    .start-btn-main .sb-text { flex:1; }
    .start-btn-main .sb-label { font-size:14px; font-weight:700; }
    .start-btn-main .sb-desc  { font-size:11px; opacity:0.6; font-weight:400; margin-top:2px; }
    .start-btn-main .sb-arr   { color:#ffffff22; font-size:18px; }
    .start-version { color:#2a2a3a; font-size:10px; margin-top:24px; letter-spacing:2px; }

    /* ── Intro splash screen ──────────────────────────────────────── */
    .intro-splash {
      display:flex; flex-direction:column; align-items:center;
      min-height:100%; padding:20px 20px 30px; gap:0;
    }
    .intro-title { text-align:center; margin-bottom:16px; padding-top:16px; }
    .intro-cram {
      font-family:'Press Start 2P', monospace;
      font-size:32px; letter-spacing:6px;
      background:linear-gradient(135deg, #c8a2ff 0%, #8866cc 50%, #5533aa 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      filter:drop-shadow(0 0 18px rgba(140,80,255,.5));
      margin-bottom:8px;
    }
    .intro-subtitle {
      font-family:'Press Start 2P', monospace;
      font-size:10px; color:#4a3a6a; letter-spacing:4px;
    }
    /* Characters side by side */
    .intro-chars {
      display:flex; align-items:flex-end; justify-content:center;
      gap:32px; flex:1; padding:0 10px;
      min-height:220px;
    }
    .intro-char {
      display:flex; flex-direction:column; align-items:center; gap:6px;
      transition:all 0.3s ease;
      opacity:0.55; transform:scale(0.92);
    }
    .intro-char.char-active {
      opacity:1; transform:scale(1);
    }
    .intro-char svg { width:110px; height:150px; filter:drop-shadow(0 4px 18px rgba(0,0,0,.6)); }
    .intro-shanty svg { filter:drop-shadow(0 4px 18px rgba(0,80,180,.3)); }
    .intro-getrich svg { filter:drop-shadow(0 4px 18px rgba(240,192,0,.25)); }
    .intro-char-name {
      font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase;
      color:#4a4a6a;
    }
    .intro-shanty .intro-char-name { color:#2a4a8a; }
    .intro-getrich .intro-char-name { color:#7a6010; }
    /* Dialogue box */
    .intro-dialogue {
      width:100%; max-width:520px; background:#080814;
      border:1px solid #1e1e38; border-radius:12px;
      padding:18px 20px; margin-top:12px;
    }
    .intro-speaker {
      font-size:11px; font-weight:800; letter-spacing:1.5px;
      text-transform:uppercase; margin-bottom:8px;
    }
    .spk-rich { color:#d4a800; }
    .spk-cpt  { color:#4a90cc; }
    .intro-line {
      color:#c8c8d8; font-size:14px; line-height:1.7;
      min-height:48px; transition:opacity 0.2s;
    }
    .intro-next-btn {
      margin-top:14px; width:100%; padding:11px 0;
      background:#0f0f24; border:1px solid #3a3a7a; color:#9988cc;
      border-radius:8px; font-size:13px; font-weight:700; letter-spacing:1px;
      cursor:pointer; transition:all 0.15s; font-family:inherit;
    }
    .intro-next-btn:hover { background:#18183a; border-color:#6655cc; color:#c8b8ff; }
    .intro-skip {
      margin-top:12px; font-size:10px; color:#2a2a3a; cursor:pointer;
      letter-spacing:1px; text-decoration:underline; text-underline-offset:3px;
    }
    .intro-skip:hover { color:#4a4a6a; }
    /* GetRICH fun-fact bubble */
    .getrich-fact-bubble {
      position:relative; background:#0a0a1e; border:1px solid #d4a800;
      border-radius:10px; padding:8px 14px; max-width:260px;
      font-size:11.5px; color:#e8d070; line-height:1.55;
      margin:0 auto -6px; text-align:center;
      box-shadow:0 0 12px rgba(212,168,0,.15);
    }
    .getrich-fact-bubble::after {
      content:''; position:absolute; bottom:-8px; left:50%; transform:translateX(-50%);
      border:8px solid transparent; border-top-color:#d4a800; border-bottom:none;
    }
    .getrich-fact-icon { font-size:13px; margin-right:4px; }

    /* ── Back button ─────────────────────────────────────────────────── */
    .back-btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px;
      background:transparent; border:1px solid #222; border-radius:6px; color:#444;
      font-size:12px; cursor:pointer; transition:all 0.15s; margin-bottom:14px; }
    .back-btn:hover { border-color:#555; color:#888; background:#111; }

    /* ── Past Papers Mode ───────────────────────────────────────────── */
    .pp-screen { padding:0; }
    .pp-header { background:linear-gradient(135deg,#070018,#0d0030,#070018); border:1px solid #2a1a5a;
      border-radius:12px; padding:28px 24px; margin-bottom:16px; text-align:center; }
    .pp-header h2 { color:#c8a2ff; font-size:24px; letter-spacing:2px; margin-bottom:6px; }
    .pp-header p  { color:#5a4a7a; font-size:13px; }
    .pp-tabs { display:flex; gap:8px; margin-bottom:16px; }
    .pp-tab { flex:1; padding:10px; background:#0a0a18; border:1px solid #1a1a30; border-radius:8px;
      color:#666; font-size:13px; cursor:pointer; text-align:center; transition:all 0.15s; }
    .pp-tab.active { background:#14103a; border-color:#5a3a9a; color:#c8a2ff; }
    .pp-tab:hover:not(.active) { border-color:#2a2a44; color:#888; }
    .pp-options { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
    .pp-opt-group { background:#0a0a16; border:1px solid #181830; border-radius:8px; padding:14px; }
    .pp-opt-group label { color:#555; font-size:10px; letter-spacing:1px; text-transform:uppercase; display:block; margin-bottom:8px; }
    .pp-opt-group select { background:#06060f; border:1px solid #1a1a2e; color:#bbb; padding:7px 10px;
      border-radius:5px; font-size:13px; width:100%; cursor:pointer; }
    .pp-start-btn { width:100%; padding:14px; background:#140a2e; border:1px solid #5a2a9a; color:#c8a2ff;
      border-radius:8px; font-size:15px; cursor:pointer; transition:all 0.2s; letter-spacing:1px; }
    .pp-start-btn:hover { background:#1e1040; border-color:#8a50cc; }

    /* ── Ancient Library ─────────────────────────────────────────────── */
    .library-header { display:flex; align-items:center; gap:14px; margin-bottom:18px; padding:18px 20px;
      background:linear-gradient(135deg,#06010e,#0f0326); border:1px solid #2a1040; border-radius:10px; }
    .library-header .lib-icon { font-size:32px; }
    .library-header h2 { color:#c8a2ff; font-size:20px; margin-bottom:3px; }
    .library-header p  { color:#5a4a7a; font-size:12px; }
    .concept-list { display:flex; flex-direction:column; gap:8px; margin-bottom:16px; }
    .concept-card { background:#080810; border:1px solid #14142a; border-radius:8px;
      padding:14px 16px; cursor:pointer; transition:all 0.15s; }
    .concept-card:hover { border-color:#3a2a6a; background:#0e0e1e; }
    .concept-card.active { border-color:#7a4acc; background:#0d0824; }
    .cc-top { display:flex; align-items:center; gap:10px; margin-bottom:0; }
    .cc-icon { font-size:18px; }
    .cc-name { color:#bbb; font-size:14px; font-weight:600; flex:1; }
    .cc-diff { font-size:10px; color:#3a2a5a; }
    .concept-detail { margin-top:12px; padding-top:12px; border-top:1px solid #1a1a2e; display:none; }
    .concept-card.active .concept-detail { display:block; }
    .cd-summary { color:#888; font-size:13px; line-height:1.7; margin-bottom:10px; }
    .cd-notes { color:#666; font-size:12px; line-height:1.8; white-space:pre-wrap; margin-bottom:10px;
      background:#050508; padding:10px 12px; border-radius:6px; border-left:2px solid #2a1a4a; }
    .cd-examples { margin-top:8px; }
    .cd-examples .cde-label { color:#4a3a6a; font-size:10px; letter-spacing:1px; text-transform:uppercase; margin-bottom:5px; }
    .cd-ex-item { color:#6688aa; font-size:12px; padding:4px 0; border-bottom:1px solid #0e0e18; line-height:1.5; }
    .cd-complexity { margin-top:8px; padding:6px 10px; background:#060611; border:1px solid #1a1a30;
      border-radius:4px; color:#5a7a9a; font-size:11px; font-style:italic; }

    /* ── Past Papers Quiz ────────────────────────────────────────────── */
    .pp-quiz-header { display:flex; justify-content:space-between; align-items:center;
      padding:12px 16px; background:#080810; border:1px solid #14142a; border-radius:8px; margin-bottom:14px; }
    .pp-quiz-score  { font-size:18px; color:#c8a2ff; font-weight:bold; }
    .pp-quiz-meta   { font-size:11px; color:#444; text-align:right; }
    .pp-qbox { background:#080810; border:1px solid #1a1a2e; border-radius:10px; padding:20px; margin-bottom:14px; }
    .pp-concept-tag { font-size:10px; color:#4a3a7a; letter-spacing:1px; text-transform:uppercase; margin-bottom:10px; }
    .pp-question    { color:#ddd; font-size:15px; line-height:1.7; margin-bottom:16px; }
    .pp-result-box  { padding:14px 16px; border-radius:8px; margin:10px 0; font-size:13px; line-height:1.6; }
    .pp-result-box.correct { background:#082008; border:1px solid #1a5a1a; color:#8dcc8d; }

<script>
const API = "http://localhost:8000";

// ── State ──────────────────────────────────────────────────────────────────
let gameId    = null;   // game session id
let world     = null;
let curNode   = null;
let player    = { level:1, xp:0, hp:100, max_hp:100, insight:0 };

// combat state (separate from game session)

let combatHp  = { player: 100, playerMax: 100, enemy: 60, enemyMax: 60 };

let combatRound = 1;
let combatStreak = 0;

function log(msg) {
  logs.push(msg);
  if (logs.length > 60) logs.shift();
}
function renderLog() {
  return `<div class="log">${logs.slice(-20).map(l=>`<div>> ${l}</div>`).join('')}</div>`;
}
function render(html) { document.getElementById("app").innerHTML = html; }

async function api(path, method="GET", body=null) {
  const opts = { method, headers:{"Content-Type":"application/json"} };
  if (body) opts.body = JSON.stringify(body);
  try {
    const res = await fetch(API + path, opts);
    if (!res.ok) {
      const e = await res.json().catch(()=>({detail:res.statusText}));
      log("❌ " + (e.detail||res.statusText));
      return null;
    }
    return res.json();
  } catch(e) {
    log("❌ Connection error: " + e.message);
    return null;
  }
}

function pct(v, max) { return Math.max(0, Math.min(100, Math.round((v/max)*100))); }

function playerBar() {
  const hp = player.hp, mhp = player.max_hp;
  const xpInLevel = player.xp % 50, xpNeeded = 50;
  const debuffHtml = playerDebuffs.length
    ? `<span class="s debuff-row" title="${playerDebuffs.map(d=>d.name+': '+d.desc).join(' | ')}">
        ${playerDebuffs.map(d=>`<span class="debuff-chip">${d.icon} ${d.name}</span>`).join('')}
       </span>`
    : '';
  return `<div class="pbar">
    <span class="s">Lv <b>${player.level}</b></span>
    <span class="s">
      XP <b>${player.xp}</b>
      <span class="xp-bar"><span class="xp-fill" style="width:${pct(xpInLevel,xpNeeded)}%"></span></span>
    </span>
    <span class="s">
      HP <b>${hp}/${mhp}</b>
      <span class="hp-bar"><span class="hp-fill" style="width:${pct(hp,mhp)}%"></span></span>
    </span>
    <span class="s">💡 <b>${player.insight||0}</b></span>
    ${debuffHtml}
  </div>`;
}

function dmgPop(text, type, el) {
  const pop = document.createElement("div");
  pop.className = `dmg-pop ${type}`;
  pop.textContent = text;
  const r = el ? el.getBoundingClientRect() : {left:window.innerWidth/2, top:window.innerHeight/2};
  pop.style.left = (r.left + r.width/2) + "px";
  pop.style.top  = (r.top) + "px";
  document.body.appendChild(pop);
  setTimeout(() => pop.remove(), 1300);
}

// Current active tutorial dialogue
let _tutorDialogue     = null;  // { lines: [], idx: 0, onDone: fn }
let _tutorOverlayEl    = null;

function ensureTutorOverlay() {
  if (!_tutorOverlayEl) {
    const el = document.createElement('div');
    el.className = 'tutor-overlay';
    el.id = 'tutor-overlay';
    el.innerHTML = `
      <div class="tutor-box" id="tutor-box">
        <div class="tutor-sprite-wrap">${getSirGetRICHSprite()}</div>
        <div class="tutor-bubble">
          <div class="tutor-name">Sir GetRICH</div>
          <div class="tutor-text" id="tutor-text"></div>
          <button class="tutor-btn" id="tutor-btn" onclick="advanceTutorDialogue()">Sharp →</button>
        </div>
      </div>
    `;
    document.body.appendChild(el);
    _tutorOverlayEl = el;
  }
  return _tutorOverlayEl;
}

function showTutorDialogue(lines, onDone, introMode) {
  if (!isTutorialMode) return;
  const el = ensureTutorOverlay();
  _tutorDialogue = { lines: Array.isArray(lines) ? lines : [lines], idx: 0, onDone: onDone || null };
  const textEl = document.getElementById('tutor-text');
  if (textEl) textEl.innerHTML = _tutorDialogue.lines[0];
  const btnEl = document.getElementById('tutor-btn');
  if (btnEl) btnEl.textContent = _tutorDialogue.lines.length > 1 ? 'Continue →' : 'Sharp →';
  if (introMode) {
    el.classList.add('intro-mode');
  } else {
    el.classList.remove('intro-mode');
  }
  el.classList.add('visible');
}

function advanceTutorDialogue() {
  if (!_tutorDialogue) return;
  _tutorDialogue.idx++;
  if (_tutorDialogue.idx >= _tutorDialogue.lines.length) {
    // Done
    const cb = _tutorDialogue.onDone;
    _tutorDialogue = null;
    hideTutorDialogue();
    if (cb) cb();
    return;
  }
  const textEl = document.getElementById('tutor-text');
  const btnEl  = document.getElementById('tutor-btn');
  if (textEl) textEl.innerHTML = _tutorDialogue.lines[_tutorDialogue.idx];
  if (btnEl) {
    const remaining = _tutorDialogue.lines.length - _tutorDialogue.idx - 1;
    btnEl.textContent = remaining > 0 ? 'Continue →' : 'Sharp →';
  }
}

function hideTutorDialogue() {
  const el = document.getElementById('tutor-overlay');
  if (el) { el.classList.remove('visible'); el.classList.remove('intro-mode'); }
}

function renderTutorialOverworld() {
  navBack = null;
  const nodeOrder = ['citadel','tut_combat_1','tut_tavern','tut_combat_2','tut_boss'];
  const nodeInfo = {
    citadel:      { icon:'🏰', name:'The Citadel', desc:'Your starting point.' },
    tut_combat_1: { icon:'⚔️', name:'First Encounter', desc:'A weaker enemy to practice on.' },
    tut_tavern:   { icon:'🍺', name:'Tavern', desc:'Rest and buy upgrades.' },
    tut_combat_2: { icon:'⚔️', name:'Second Encounter', desc:'A tougher test.' },
    tut_boss:     { icon:'💀', name:'Tutorial Boss', desc:'Prove you\'ve learned the ropes.' },
  };

  const nodes = nodeOrder.map((nid, i) => {
    const n = tutorialWorld ? tutorialWorld[nid] : null;
    const info = nodeInfo[nid] || { icon:'❓', name:nid, desc:'' };
    const isCurrent = nid === curNode;
    const isCleared = n?.state === 'cleared';
    return `
      ${i > 0 ? '<div class="tut-connector"></div>' : ''}
      <div class="tut-node ${isCurrent?'active':''} ${isCleared?'cleared':''}">
        <div class="tut-node-icon">${info.icon}</div>
        <div class="tut-node-info">
          <div class="tut-node-name">${info.name}</div>
          <div class="tut-node-desc">${info.desc}</div>
        </div>
        ${isCurrent && !isCleared ? `<button onclick="tutorialEnterNode('${nid}')" style="padding:6px 14px;background:#1a4a1a;border:1px solid #3a8a3a;color:#88ee88;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;">Enter →</button>` : ''}
      </div>
    `;
  }).join('');

  render(`
    <div class="header"><h1>C.R.A.M — Tutorial</h1></div>
    ${playerBar()}
    <div style="text-align:center;color:#3a6a3a;font-size:12px;margin:8px 0 16px;letter-spacing:1px;">Tutorial World · Sir GetRICH Mode</div>
    <div class="tutorial-map">${nodes}</div>
    ${renderLog()}
  `);

  // Show contextual dialogue for current node
  const stepDialogues = {
    citadel:      null,  // handled at start
    tut_combat_1: SIR_GETRICH_DIALOGUES.before_first_combat,
    tut_tavern:   SIR_GETRICH_DIALOGUES.tavern,
    tut_combat_2: SIR_GETRICH_DIALOGUES.before_second_combat,
    tut_boss:     SIR_GETRICH_DIALOGUES.before_boss,
  };
  const lines = stepDialogues[curNode];
  if (lines && tutorialStep < 99) {
    tutorialStep = 99; // prevent re-showing
    setTimeout(() => showTutorDialogue(lines, null), 400);
  }
}

async function tutorialEnterNode(nodeId) {
  hideTutorDialogue();
  const nInfo = tutorialWorld ? tutorialWorld[nodeId] : null;
  if (!nInfo) { renderTutorialOverworld(); return; }

  // Citadel: mark cleared, advance to first combat
  if (nInfo.type === 'citadel') {
    if (tutorialWorld[nodeId]) tutorialWorld[nodeId].state = 'cleared';
    curNode = 'tut_combat_1';
    renderTutorialOverworld();
    return;
  }

  if (nInfo.type === 'combat' || nInfo.type === 'boss') {
    // Start tutorial combat
    const r = await api("/api/tutorial/combat/start","POST",{
      weapon_id:       player.weapon_id || "none",
      armor_id:        player.armor_id  || "none",
      node_difficulty: nInfo.difficulty || 1,
      bonus_insight:   player.insight   || 0,
      bonus_abilities: playerBonusAbilities || [],
    });
    if (!r) { renderTutorialOverworld(); return; }
    combatId          = r.session_id;
    combatRound       = r.round||1;
    combatStreak      = r.streak||0;
    combatInsightUses = r.insight_uses ?? 2;
    combatXpReward    = r.xp_reward || 30;
    combatHp.player   = r.player_hp;
    combatHp.playerMax= r.player_max_hp;
    combatHp.enemy    = r.enemy_hp;
    combatHp.enemyMax = r.enemy_max_hp;
    combatEnemy       = { name: r.enemy_name, subtype: r.enemy_subtype || 'guard' };
    combatLocked      = false;
    _currentNodeId    = nodeId;
    renderCombat(r.question, r);

  } else if (nInfo.type === 'tavern') {
    renderTavernScreen(() => {
      // Mark tavern cleared
      if (tutorialWorld && tutorialWorld[nodeId]) tutorialWorld[nodeId].state = 'cleared';
      // Advance to next node
      const order = ['citadel','tut_combat_1','tut_tavern','tut_combat_2','tut_boss'];
      const idx = order.indexOf(nodeId);
      if (idx >= 0 && idx < order.length - 1) curNode = order[idx+1];
      renderTutorialOverworld();
    });
  }
}

      <div id="subject-list"><div style="color:#4a3a1a;text-align:center;padding:20px">Loading subjects…</div></div>
    </div>
  `);

  const data = await api("/api/subjects");
  if (!data) return;

  const { active, subjects } = data;

  // Update global display name
  const activeSub = subjects.find(s => s.id === active);
  if (activeSub) _activeSubjectName = activeSub.name;

  const cards = subjects.map(s => {
    const isActive = s.id === active;
    const metaParts = [
      `${s.question_count} questions`,
      s.has_concepts ? 'concepts ✓' : 'no concepts',
      s.pdf_count > 0 ? `${s.pdf_count} PDF${s.pdf_count !== 1 ? 's' : ''}` : 'no PDFs',
    ];
    return `
      <div class="subject-card ${isActive ? 'active-subject' : ''}"
           onclick="${isActive ? '' : `switchSubject('${s.id}')`}"
           style="${isActive ? 'cursor:default' : ''}">
        <span class="subject-card-icon">${s.pdf_count > 0 ? '📂' : '📁'}</span>
        <div class="subject-card-info">
          <div class="subject-card-name">${escHtml(s.name)}</div>
          <div class="subject-card-meta">${metaParts.join(' · ')}</div>
        </div>
        ${isActive
          ? `<span class="subject-card-active-badge">✓ ACTIVE</span>`
          : `<span style="color:#3a2a0a;font-size:18px">›</span>`}
      </div>`;
  }).join('');

  const noSubjects = subjects.length === 0
    ? `<div style="color:#3a2a0a;text-align:center;padding:20px">No subjects found.</div>`
    : '';

  document.getElementById('subject-list').innerHTML = `
    ${noSubjects || cards}
    <div class="subject-hint">
      <b style="color:#6a4a1a">How to add a subject:</b><br>
      1. Click <b style="color:#cc8833">📁 Open Subjects Folder</b> above — it opens in File Explorer<br>
      2. Create a new folder, e.g. <code>subjects/svv/</code><br>
      3. Drop in your files:<br>
         &nbsp;&nbsp;&nbsp;• <code>questions.json</code> — questions (required)<br>
         &nbsp;&nbsp;&nbsp;• <code>concepts.json</code> — study notes for Field Notes tab (optional)<br>
         &nbsp;&nbsp;&nbsp;• Any <code>.pdf</code> files — show up in Ancient Library (optional)<br>
      4. Click <b style="color:#88cc44">🔄 Refresh List</b> — your subject appears instantly, no restart needed<br><br>
      Use <code>CRAM_SUBJECT_TEMPLATE.json</code> as a guide and hand it to an AI with your notes to generate the JSON files.
    </div>
  `;
}

async function switchSubject(subjectId) {
  const card = document.querySelector(`.subject-card[onclick*="${subjectId}"]`);
  if (card) card.style.opacity = '0.5';

  const data = await api("/api/set_subject", "POST", { subject_id: subjectId });
  if (!data) { if (card) card.style.opacity = ''; return; }

  // Clear the cached library data so it reloads for the new subject
  _libraryData = null;

  // Load and merge any custom weapons/armors/upgrades/enemies for this subject
  await loadSubjectGameConfig();

  // Update active subject display name
  const subjects = (await api("/api/subjects"))?.subjects || [];
  const active = subjects.find(s => s.id === subjectId);
  if (active) _activeSubjectName = active.name;

  // Re-render the switcher to show new active state
  await renderSubjectSwitcher();
}

async function chooseWeaponUpgrade(tier, choiceIdx) {
  // Before upgrading, snapshot the current (lower-tier) weapon's ability for stacking
  const prevWeapon = getActiveWeaponData();
  if (prevWeapon && prevWeapon.weapon_id !== 'none') {
    // Extract the ability string from the description if needed
    // getActiveWeaponData returns the WEAPON_PATHS entry; ability is in the .ability field
    const prevAbilityId = _getWeaponAbilityId(playerPath, playerWeaponTier, playerWeaponChoices);
    if (prevAbilityId && !playerBonusAbilities.includes(prevAbilityId)) {
      playerBonusAbilities.push(prevAbilityId);
    }
  }

  playerWeaponChoices[tier - 1] = choiceIdx;
  playerWeaponTier = tier;
  pendingWeaponUpgrade = null;
  const w = getActiveWeaponData();
  player.weapon_id = w.weapon_id;
  // Equip the new weapon on the backend session
  await api("/api/game/equip","POST",{ session_id:gameId, weapon_id:w.weapon_id });
  log(`⚔️ Evolved: ${w.name} — ${w.ability}`);
  // Show stacked abilities info
  if (playerBonusAbilities.length > 0) {
    log(`✨ Ability stack: ${playerBonusAbilities.join(' + ')} still active`);
  }
  renderOverworld();
}

// Returns the backend ability_id string for a given path/tier/choices combo
function _getWeaponAbilityId(path, tierIdx, choices) {
  // Maps weapon_id → backend ability string
  const WEAPON_ABILITY_IDS = {
    binary_blade:     'binary_strike',
    cleave_edge:      'chain_strike',
    blood_blade:      'life_steal',
    void_cleaver:     'binary_strike',
    berserker_blade:  'life_steal',
    recursive_staff:  'recursive_echo',
    echo_codex:       'echo_double',
    seeker_rod:       'seeker',
    grand_codex:      'echo_triple',
    oracle_staff:     'oracle',
    balance_edge:     'balance_shift',
    iron_bulwark:     'counter',
    null_blade:       'null_first',
    fortress_edge:    'fortify_wep',
    reflect_blade:    'mirror',
  };
  const p = WEAPON_PATHS[path];
  if (!p) return null;
  const tierData = p.tiers[tierIdx];
  if (!tierData) return null;
  let weaponId;
  if (tierIdx === 0) {
    weaponId = tierData.weapon_id;
  } else {
    const choiceIdx = choices[tierIdx - 1] ?? 0;
    weaponId = tierData.options[choiceIdx]?.weapon_id;
  }
  return WEAPON_ABILITY_IDS[weaponId] || null;
}

async function startGame() {
  render(`<div class="start"><p style="color:#555">Generating world...</p></div>`);
  await loadSubjectGameConfig();
  const data = await api("/api/game/start","POST");

  gameId  = data.session_id;
  world   = data.world;
  curNode = data.current_node;

  // Reset tier state for fresh run
  playerWeaponTier     = 0;
  playerArmorTier      = 0;
  playerWeaponChoices  = [];
  playerBonusAbilities = [];
  pendingWeaponUpgrade = null;

  log("Run started — session: " + gameId);
  await syncPlayer();

  // Equip T1 weapon and armor from chosen paths
  const w = getActiveWeaponData();
  const a = getActiveArmorData();
  player.weapon_id = w.weapon_id;
  player.armor_id  = a.armor_id;
  await api("/api/game/equip","POST",{ session_id:gameId, weapon_id:w.weapon_id, armor_id:a.armor_id });
  log(`🗡️ ${WEAPON_PATHS[playerPath].name} path — equipped ${w.name} + ${a.name}`);

async function syncPlayer() {
  const d = await api(`/api/game/world/${gameId}`);
  if (!d) return;
  player  = { level:d.level, xp:d.xp, hp:d.hp, max_hp:d.max_hp, insight:d.insight||0,
              weapon_id: d.weapon_id||"none", armor_id: d.armor_id||"none" };
  world   = d.world;
  curNode = d.current_node;
  if (d.debuffs)   playerDebuffs  = d.debuffs;
  if (d.upgrades)  playerUpgrades = d.upgrades;
}

// ── Overworld ──────────────────────────────────────────────────────────────
function renderOverworld() {
  const conns = world[curNode]?.connections || [];
  // cur must be declared before nodeEls map (used inside for combat-lock logic)
  const cur = world[curNode] || {};

  // Build depth groups
  const depths = {};
  for (const [id, n] of Object.entries(world)) {
    const d = n.depth;
    if (!depths[d]) depths[d] = [];
    depths[d].push({id,...n});
  }
  const sortedD = Object.keys(depths).map(Number).sort((a,b)=>a-b);

  // Layout constants
  const COL_W   = 112;
  const PAD_X   = 60;
  const PAD_TOP = 24;
  const PAD_BOT = 44;
  const MAP_H   = 320;
  const AREA_H  = MAP_H - PAD_TOP - PAD_BOT;
  const NODE_R  = 24;

  // Assign x,y positions per node
  const positions = {};
  for (const d of sortedD) {
    const nodes = depths[d];
    const count = nodes.length;
    nodes.forEach((node, i) => {
      const x = PAD_X + d * COL_W;
      const y = PAD_TOP + (count === 1 ? AREA_H / 2 : (i / (count - 1)) * AREA_H);
      positions[node.id] = {x, y};
    });
  }

  const mapW = PAD_X * 2 + (sortedD.length - 1) * COL_W;
  const mapH = MAP_H;

  // Node visuals
  const TYPE_ICON  = {combat:'⚔️', challenge:'🔮', utility:'❤️', event:'⚡', hub:'🏰', anomaly:'⚠️'};
  const TYPE_COLOR = {combat:'#bb3333', challenge:'#7733bb', utility:'#228844', event:'#bb7722', hub:'#c8a2ff', anomaly:'#aa00ee'};

  // Build SVG connection paths
  const drawnLines = new Set();
  const linePaths = [];
  for (const [id, n] of Object.entries(world)) {
    for (const connId of (n.connections || [])) {
      const key = [id, connId].sort().join('|');
      if (drawnLines.has(key) || !positions[id] || !positions[connId]) continue;
      drawnLines.add(key);
      const a = positions[id], b = positions[connId];
      const isTravel = (id===curNode && conns.includes(connId)) || (connId===curNode && conns.includes(id));
      const bothCleared = world[id]?.state==='cleared' && world[connId]?.state==='cleared';
      // Quadratic bezier for visual curves
      const mx = (a.x + b.x) / 2;
      const my = (a.y + b.y) / 2 - Math.abs(b.x - a.x) * 0.06;
      const pathD = `M${a.x},${a.y} Q${mx},${my} ${b.x},${b.y}`;
      if (isTravel) {
        // Double line for travelable paths — glow + solid
        linePaths.push(`<path d="${pathD}" fill="none" stroke="#1a3a6a" stroke-width="6" stroke-opacity="0.4" stroke-linecap="round"/>`);
        linePaths.push(`<path d="${pathD}" fill="none" stroke="#4a8acc" stroke-width="2" stroke-opacity="0.9" stroke-linecap="round"/>`);
      } else if (bothCleared) {
        linePaths.push(`<path d="${pathD}" fill="none" stroke="#1a2a1a" stroke-width="1.5" stroke-opacity="0.5" stroke-linecap="round"/>`);
      } else {
        linePaths.push(`<path d="${pathD}" fill="none" stroke="#1c2438" stroke-width="1.5" stroke-opacity="0.6" stroke-dasharray="3,4" stroke-linecap="round"/>`);
      }
    }
  }

  // Build depth column labels (biome label at bottom of each column)
  const colLabels = sortedD.map(d => {
    const firstNode = depths[d]?.[0];
    const px = positions[firstNode?.id];
    if (!px) return '';
    const lbl = d===0 ? 'ORIGIN' : `DEPTH ${d}`;
    return `<div style="position:absolute;bottom:6px;left:${px.x}px;transform:translateX(-50%);font-size:8px;color:#1e1e2e;letter-spacing:1px;white-space:nowrap;user-select:none">${lbl}</div>`;
  }).join('');

  // Build node circle elements
  const nodeEls = Object.entries(world).map(([id, n]) => {
    const pos = positions[id];
    if (!pos) return '';
    const isCurrent   = id === curNode;
    // Lock forward movement if standing on uncleared combat/anomaly node
    const curIsBlocker = (cur.type === 'combat' || cur.type === 'anomaly') && cur.state !== 'cleared';
    const isForwardNode = (n.depth ?? 0) > (cur.depth ?? 0);
    const isLockedForward = curIsBlocker && isForwardNode && conns.includes(id);
    const isReachable = !isCurrent && conns.includes(id) && !isLockedForward;
    const isCleared   = n.state === 'cleared';
    const isVisited   = n.state === 'visited';
    const isFog       = n.state === 'unvisited' && !isCurrent && !isReachable && !isLockedForward;

    const icon  = TYPE_ICON[n.type]  || '?';
    const color = TYPE_COLOR[n.type] || '#555';
    const label = id==='citadel' ? 'Citadel' : (n.subtype || n.type);
    const displayLabel = isFog ? '???' : label;

    let cls = 'map-node';
    if (isCurrent)         cls += ' mn-current';
    else if (isReachable)  cls += ' mn-reachable';
    else if (isLockedForward) cls += ' mn-locked';
    else if (isCleared)    cls += ' mn-cleared';
    else if (isVisited)    cls += ' mn-visited';
    else                   cls += ' mn-fog';

    const onClick    = isReachable ? `onclick="moveTo('${id}')"` : isCurrent ? `onclick="enterNode()"` : isLockedForward ? `onclick="showBlockedMsg()"` : '';
    const borderCol  = isLockedForward ? '#5a1a1a' : isFog ? '#131320' : color;
    const bgCol      = isCurrent ? '#110820' : isCleared ? '#060608' : '#070b14';
    const borderW    = isCurrent ? '2.5px' : '2px';
    const size       = NODE_R * 2;

    return `<div class="${cls}"
      style="left:${pos.x-NODE_R}px;top:${pos.y-NODE_R}px;width:${size}px;height:${size}px;
             border-color:${borderCol};border-width:${borderW};background:${bgCol};--nc:${color}"
      ${onClick} title="${id} · ${n.type}/${n.subtype} · depth ${n.depth}">
      <div class="mn-icon">${isFog ? (n.type==='anomaly' ? '⚠️' : '?') : icon}</div>
      <div class="mn-label">${displayLabel}</div>
    </div>`;
  }).join('');

  // Player pin SVG — pulsing ring above current node
  const pinPos = positions[curNode];
  const playerPin = pinPos ? `
    <circle cx="${pinPos.x}" cy="${pinPos.y - NODE_R - 10}" r="5" fill="#fff" opacity="0.9"/>
    <circle cx="${pinPos.x}" cy="${pinPos.y - NODE_R - 10}" r="5" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.5">
      <animate attributeName="r" from="5" to="13" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="0.5" to="0" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <line x1="${pinPos.x}" y1="${pinPos.y - NODE_R - 5}" x2="${pinPos.x}" y2="${pinPos.y - NODE_R}" stroke="#fff" stroke-width="1" opacity="0.6"/>
  ` : '';

  // Current node summary card
  const curColor = TYPE_COLOR[cur.type] || '#888';
  const curIcon  = TYPE_ICON[cur.type]  || '📍';
  const locName  = curNode==='citadel' ? '🏰 The Citadel' : `${curIcon} ${cur.subtype||cur.type}`;

  render(`
    <div class="header"><h1>C.R.A.M — The Unbound</h1><div class="sub">The Unread World</div></div>
    ${playerBar()}

    <div class="map-scroll-outer">
      <div class="map-scroll-bg" id="mapScroll">
        <div class="map-canvas" style="width:${mapW}px;height:${mapH}px">
          <svg class="map-svg" width="${mapW}" height="${mapH}">
            ${linePaths.join('')}
            ${playerPin}
          </svg>
          ${nodeEls}
          ${colLabels}
        </div>
      </div>
    </div>

    <div class="map-loc-card">
      <div class="mlc-left">
        <div class="mlc-dot" style="background:${curColor}"></div>
        <span class="mlc-name">${locName}</span>
        <span class="mlc-meta">· ${cur.biome||'unknown'} · depth ${cur.depth??0} · ${conns.length} path${conns.length!==1?'s':''} forward</span>
      </div>
      <div class="mlc-legend">
        <span><span class="dot" style="background:#bb3333"></span>Combat</span>
        <span><span class="dot" style="background:#7733bb"></span>Challenge</span>
        <span><span class="dot" style="background:#228844"></span>Utility</span>
        <span><span class="dot" style="background:#bb7722"></span>Event</span>
        <span><span class="dot" style="background:#c8a2ff"></span>Hub</span>
      </div>
    </div>

    <button class="abtn" data-t="info" onclick="enterNode()" style="max-width:240px">🚪 Enter Current Node</button>
    ${renderLog()}
  `);

  // Auto-scroll to current node + wire up drag-to-scroll
  setTimeout(() => {
    const scroll = document.getElementById('mapScroll');
    const pos = positions[curNode];
    if (!scroll) return;
    if (pos) scroll.scrollLeft = Math.max(0, pos.x - scroll.clientWidth / 2);
    // Drag-to-scroll (mouse)
    let isDragging = false, startX = 0, startLeft = 0;
    scroll.addEventListener('mousedown', e => {
      isDragging = true; startX = e.pageX; startLeft = scroll.scrollLeft;
      scroll.style.cursor = 'grabbing'; e.preventDefault();
    });
    window.addEventListener('mousemove', e => {
      if (!isDragging) return;
      scroll.scrollLeft = startLeft - (e.pageX - startX);
    });
    window.addEventListener('mouseup', () => {
      isDragging = false; if (scroll) scroll.style.cursor = 'grab';
    });
  }, 40);
}

async function moveTo(nodeId) {
  if (nodeId === curNode) { enterNode(); return; }
  const r = await api("/api/game/move","POST",{session_id:gameId, target_node_id:nodeId});

  curNode = r.current_node;
  if (r.node) world[curNode] = r.node;
  log(`Moved → ${curNode}`);
  renderOverworld();
}

async function enterNode() {
  const r = await api(`/api/game/node/${gameId}`);
  if (!r) return;
  const node = r.node, actions = r.actions;
  log(`Entered ${node.id} (${node.type}/${node.subtype})`);

  // ── Route tavern-type nodes to the Site of Grace screen ──────────────────
  const isTavern = (node.type === 'utility' && ['healer','save_point'].includes(node.subtype))
                || (node.type === 'hub' && node.subtype === 'citadel');
  if (isTavern) {
    // Mark visited
    await api("/api/game/node/action","POST",{session_id:gameId, action_id:'rest'}).catch(()=>{});
    await syncPlayer();
    renderTavern(node);
    return;
  }

  const fl   = getNodeFlavor(node);
  const diff = node.difficulty || 1;
  const diffBar = Array.from({length:5}, (_,i) =>
    `<span style="color:${i<diff?fl.color:'#222'};font-size:13px">◆</span>`
  ).join('');
  const statePill = node.state === 'cleared'
    ? `<span class="npill npill-cleared">✓ Cleared</span>`
    : node.state === 'visited'
    ? `<span class="npill npill-visited">◎ Visited</span>`
    : `<span class="npill npill-unvisited">◌ Unvisited</span>`;

  render(`
    <div class="header"><h1>C.R.A.M — The Unbound</h1></div>
    ${playerBar()}
    <div class="npanel" style="border-color:${fl.color}22">
      <div class="np-top">
        <div class="np-icon" style="color:${fl.color}">${fl.icon}</div>
        <div class="np-info">
          <h2 style="color:${fl.color}">${fl.title}</h2>
          <div class="np-tags">
            ${statePill}
            <span class="npill" style="color:#444">${node.biome}</span>
            <span class="npill" style="color:#444">depth ${node.depth}</span>
            <span class="npill" style="color:#444">${diffBar}</span>
            ${node.god ? `<span class="npill" style="color:#8844aa">god: ${node.god}</span>` : ''}

            const diff = a.difficulty ?? node.difficulty ?? 1;
            return `<button class="abtn" data-t="flee" onclick="attemptFlee(${diff})">${a.label}</button>`;

async function doAction(actionId) {
  if (actionId==="leave") { renderOverworld(); return; }

  const r = await api("/api/game/node/action","POST",{session_id:gameId,action_id:actionId});
  if (!r) return;
  log(`${actionId} → ${r.type}`);

  if (r.type==="combat_started") {
    await beginCombat(r);
    return;
  }
  if (r.type==="heal") {
    await syncPlayer();
    injectResult("good","❤️ " + (r.message||"Healed!"));
    return;
  }
  if (r.type==="reward") {
    const xpR = await api("/api/game/xp","POST",{session_id:gameId,amount:r.xp||10});
    if (xpR?.level_up) showLevelUp(xpR.level);
    await syncPlayer();
    injectResult("good","🎁 " + (r.message||"Found a reward!"));
    return;
  }
  if (r.type==="bonus") {
    await syncPlayer();
    injectResult("info","💡 " + (r.message||"Gained insight."));
    return;
  }
  if (r.type==="anomaly_started") {
    injectResult("info","🌀 " + (r.message||"Anomaly started."));
    return;
  }
  if (r.type==="codex_view") { renderCodex(enterNode); return; }
  if (r.type==="equipment_menu") { renderEquipment(enterNode); return; }
  if (r.type==="map_view") { renderOverworld(); return; }
  if (r.type==="flee") { injectResult("info","🏃 " + (r.message||"You fled!")); setTimeout(()=>renderOverworld(),1200); return; }
  if (r.type==="save_prompt") { injectResult("good","💾 " + (r.message||"Saved.")); return; }
  if (r.type==="shop_menu") { injectResult("info","🛒 " + (r.message||"Shop coming soon.")); return; }
  if (r.message) { injectResult("info", r.message); return; }
  renderOverworld();
}

// ── Flee mechanic ─────────────────────────────────────────────────────────────
// Enemy flee dice by difficulty (1–5). Diff 5 always rolls 20 (Grand Examiner level).
// Enemy flee dice by node difficulty (index = difficulty 0–5).
// Diff 5 is handled separately — enemy always rolls 20 (anomaly / Grand Examiner).
const FLEE_ENEMY_DICE = [0, 8, 10, 12, 16, 20];

// MAX_LEVEL reference for flee scaling. Level beyond this still caps at die=19.
const FLEE_MAX_LEVEL = 20;

/**
 * Player flee die scales with level:
 *   Level  1  → d16  (worst)
 *   Level 20+ → d19  (best normal roll)
 *   A natural 20 is always possible but rare (~2% at lv1, ~8% at lv20).
 *   Player must roll STRICTLY MORE than enemy to escape.
 *   Difficulty 5 enemies (anomaly / boss) always roll 20 — impossible to flee.
 */
function playerFleeDie() {
  const lv = Math.max(1, player.level || 1);
  // Linear scale: lv1→16, lv20→19, capped at 19
  const dieSides = Math.min(16 + Math.floor((lv - 1) / (FLEE_MAX_LEVEL - 1) * 3), 19);
  // Independent small chance of a natural 20 (rare at low level, slightly more at high)
  const nat20Chance = 0.02 + Math.min(lv, FLEE_MAX_LEVEL) * 0.003; // 2.3%–8%
  if (Math.random() < nat20Chance) return { roll: 20, die: dieSides, nat20: true };
  return { roll: Math.floor(Math.random() * dieSides) + 1, die: dieSides, nat20: false };
}

async function attemptFlee(difficulty) {
  const btn = document.querySelector('.abtn[data-t="flee"]');
  if (btn) { btn.disabled = true; btn.textContent = '🎲 Rolling…'; }

  const { roll: playerRoll, die: playerDie, nat20 } = playerFleeDie();

  const enemyDieMax = FLEE_ENEMY_DICE[Math.min(difficulty, 5)] || 8;
  // Difficulty 5 = anomaly / Grand Examiner: always rolls perfect 20 → cannot flee
  const enemyRoll   = difficulty >= 5 ? 20 : Math.floor(Math.random() * enemyDieMax) + 1;

  // Strict greater-than: must roll MORE than enemy, never equal
  const success = playerRoll > enemyRoll;

  // Build enemy label
  const enemyLabel = difficulty >= 5
    ? 'Grand Examiner (∞ — cannot flee)'
    : `Enemy (d${enemyDieMax})`;

  // Natural 20 special glow label
  const playerLabel = nat20
    ? `You ✨ NAT 20!`
    : `You (d${playerDie}, lv${player.level || 1})`;

  // Show the dice roll panel
  const panel = document.getElementById('flee-result-panel');
  if (panel) {
    const playerColor = success ? '#88cc88' : (nat20 && !success ? '#f1c40f' : '#cc6666');
    const enemyColor  = success ? '#cc6666' : '#88cc88';
    panel.innerHTML = `
      <div class="flee-panel">
        <div class="flee-title">🎲 Flee Attempt — need strictly more than enemy</div>
        <div class="dice-row">
          <div class="dice-block">
            <span class="dice-face" style="${nat20 ? 'filter:drop-shadow(0 0 8px gold)' : ''}">🎲</span>
            <div class="dice-label">${escHtml(playerLabel)}</div>
            <div class="dice-val" style="color:${playerColor};${nat20?'text-shadow:0 0 10px gold':''}">${playerRoll}${nat20 ? ' ✨' : ''}</div>
          </div>
          <div class="dice-vs">vs</div>
          <div class="dice-block">
            <span class="dice-face">💀</span>
            <div class="dice-label">${escHtml(enemyLabel)}</div>
            <div class="dice-val" style="color:${enemyColor}">${enemyRoll}</div>
          </div>
        </div>
        <div id="flee-outcome"></div>
      </div>`;
  }

  // Small delay for visual effect, then show outcome
  await new Promise(r => setTimeout(r, 600));

  const outcome = document.getElementById('flee-outcome');
  if (success) {
    if (outcome) outcome.innerHTML = `<div class="flee-result success">✅ You slipped away into the dark. Path back is clear.</div>`;
    await new Promise(r => setTimeout(r, 1200));
    renderOverworld();
  } else {
    // Flee failed — enemy deals free damage
    const freeDmg = Math.max(5, Math.floor(difficulty * 6 + Math.random() * difficulty * 6));
    let dmgResult = null;
    if (gameId) {
      dmgResult = await api("/api/game/damage", "POST", { session_id: gameId, amount: freeDmg });
      await syncPlayer();
    }
    const hpText = dmgResult ? ` (${dmgResult.hp}/${player.max_hp} HP remaining)` : '';
    const dead   = dmgResult?.dead || false;

    if (outcome) outcome.innerHTML = `
      <div class="flee-result fail">
        ❌ Caught! The enemy strikes for <span class="flee-dmg">${freeDmg} damage</span> while you run.${hpText}
        ${dead ? '<br><b style="color:#ff4444">You have fallen.</b>' : ''}
      </div>`;

    if (dead) {
      await new Promise(r => setTimeout(r, 2000));
      // Reuse the defeat screen — fake minimal combat state so endCombat renders correctly
      combatRound = 0; isAnomalyCombat = false;
      combatEnemy = { name: "the Dark", concept: "", subtype: "guard", tier: "standard" };
      endCombat(false);
      return;
    }

    // Re-enable the flee button after the punishment
    await new Promise(r => setTimeout(r, 800));
    if (btn) { btn.disabled = false; btn.textContent = '🏃 Attempt Flee'; }
  }
}

function injectResult(type, msg) {
  const panel = document.querySelector(".npanel");
  if (!panel) return;
  const old = panel.querySelector(".rbox");
  if (old) old.remove();
  panel.insertAdjacentHTML("beforeend",`<div class="rbox ${type}">${msg}</div>`);
}
